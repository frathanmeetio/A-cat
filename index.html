<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第一次的亲密接触 — 与狸花猫的一年</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #c8a97e;
  background-image:
    radial-gradient(ellipse at 30% 20%, #d4b896 0%, transparent 60%),
    radial-gradient(ellipse at 70% 80%, #b8956a 0%, transparent 60%);
  position: relative;
  width: 100vw; height: 100vh;
  overflow: hidden;
  font-family: 'Microsoft YaHei', '微软雅黑', Georgia, serif;
  user-select: none;
}

#game-wrap {
  position: absolute;
  top: 0; left: 0;
  width: 800px; height: 560px;
  transform-origin: top left;
}

#bg-canvas {
  position: absolute; top: 0; left: 0;
  border-radius: 24px;
  box-shadow:
    0 20px 60px rgba(100,60,20,0.35),
    0 4px 12px rgba(100,60,20,0.2),
    inset 0 1px 0 rgba(255,240,210,0.6);
}

#game-canvas {
  position: absolute; top: 0; left: 0;
  border-radius: 24px;
  cursor: pointer;
}

/* HUD */
#hud {
  position: absolute; top: 110px; right: 16px;
  background: rgba(255,248,235,0.88);
  border: 1px solid rgba(180,130,70,0.3);
  border-radius: 18px;
  padding: 14px 18px;
  color: #6b4226;
  font-size: 12px;
  min-width: 148px;
  backdrop-filter: blur(8px);
  box-shadow: 0 4px 16px rgba(120,70,20,0.15), inset 0 1px 0 rgba(255,255,255,0.8);
}
.stat-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 9px;
}
.stat-row:last-child { margin-bottom: 0; }
.stat-label { width: 46px; font-size: 11px; color: #8b5e3c; }
.stat-bar-bg {
  flex: 1; height: 6px; background: rgba(180,130,70,0.18);
  border-radius: 3px; overflow: hidden;
}
.stat-bar { height: 100%; border-radius: 3px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }
#bar-trust  { background: linear-gradient(90deg, #e8758a, #d4516a); }
#bar-health { background: linear-gradient(90deg, #7bbf7a, #4d9e4b); }
#bar-hunger { background: linear-gradient(90deg, #d4914a, #c07030); }

#day-chip {
  position: absolute; top: 16px; left: 16px;
  background: rgba(255,248,235,0.88);
  border: 1px solid rgba(180,130,70,0.3);
  border-radius: 24px; padding: 7px 18px;
  color: #8b4513; font-size: 14px; font-weight: 700;
  backdrop-filter: blur(8px);
  box-shadow: 0 4px 12px rgba(120,70,20,0.12), inset 0 1px 0 rgba(255,255,255,0.8);
  letter-spacing: 0.5px;
}

#state-chip {
  position: absolute; top: 58px; left: 16px;
  background: rgba(255,248,235,0.8);
  border: 1px solid rgba(180,130,70,0.2);
  border-radius: 24px; padding: 5px 14px;
  color: #a0622a; font-size: 12px;
  backdrop-filter: blur(6px);
}

/* Action buttons */
#actions {
  position: absolute; bottom: 12px; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 5px;
  flex-wrap: wrap; justify-content: center; max-width: 760px;
  width: 100%;
  padding: 0 8px;
}
.btn {
  background: rgba(255,248,235,0.92);
  border: 1px solid rgba(180,130,70,0.35);
  border-radius: 28px;
  color: #7a4520; font-size: 13px;
  padding: 9px 20px; cursor: pointer;
  transition: all 0.18s cubic-bezier(.4,0,.2,1);
  backdrop-filter: blur(6px);
  display: flex; align-items: center; gap: 6px;
  white-space: nowrap;
  font-family: inherit;
  box-shadow: 0 3px 10px rgba(120,70,20,0.12), inset 0 1px 0 rgba(255,255,255,0.9);
}
.btn:hover:not(:disabled) {
  background: rgba(255,252,245,0.98);
  border-color: rgba(180,120,50,0.55);
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(120,70,20,0.2), inset 0 1px 0 rgba(255,255,255,0.95);
}
.btn:active:not(:disabled) { transform: translateY(-1px); }
.btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-cd { font-size: 10px; color: #b08050; min-width: 16px; text-align: right; }

/* Popup */
#popup {
  position: fixed; inset: 0;
  display: none; align-items: center; justify-content: center;
  background: rgba(80,40,10,0.55);
  z-index: 100;
  backdrop-filter: blur(6px);
  padding: 16px;
}
#popup.show { display: flex; }
#popup-box {
  background: linear-gradient(150deg, #fffaf0 0%, #fff8e8 60%, #fef3d8 100%);
  border: 1px solid rgba(180,130,70,0.35);
  border-radius: 24px;
  padding: 28px 28px;
  max-width: 440px; width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  color: #5a3010;
  box-shadow: 0 32px 80px rgba(100,50,10,0.35), inset 0 1px 0 rgba(255,255,255,0.95);
  animation: popIn 0.35s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn {
  from { transform: scale(0.82) translateY(10px); opacity: 0; }
  to   { transform: scale(1)    translateY(0);   opacity: 1; }
}
#popup-icon  { font-size: 44px; text-align: center; margin-bottom: 12px; }
#popup-title {
  font-size: 18px; font-weight: 700; color: #8b4513;
  margin-bottom: 12px; letter-spacing: 0.5px;
}
#popup-body  {
  font-size: 13px; line-height: 1.9; color: #7a5030;
  white-space: pre-line;
}
#popup-btn {
  margin-top: 22px; width: 100%;
  background: linear-gradient(135deg, #c47830, #a85e20);
  border: none; border-radius: 16px;
  color: #fff8ee; font-size: 15px; padding: 13px;
  cursor: pointer; transition: opacity 0.2s, transform 0.1s;
  letter-spacing: 0.5px; font-weight: 600;
  font-family: inherit;
  box-shadow: 0 4px 14px rgba(140,70,10,0.35);
}
#popup-btn:hover { opacity: 0.88; }
#popup-btn:active { transform: scale(0.98); }

/* Mood chip */
#mood-chip {
  position: absolute; top: 96px; left: 16px;
  background: rgba(255,248,235,0.8);
  border: 1px solid rgba(180,130,70,0.2);
  border-radius: 24px; padding: 5px 14px;
  font-size: 12px;
  backdrop-filter: blur(6px);
  transition: color 0.5s, border-color 0.5s;
}
#mood-chip.mood-happy  { color: #e05878; border-color: rgba(220,80,110,0.35); }
#mood-chip.mood-neutral{ color: #a0622a; border-color: rgba(180,130,70,0.2);  }
#mood-chip.mood-bored  { color: #7a7a8a; border-color: rgba(120,120,150,0.3); }
#mood-chip.mood-anxious{ color: #c06020; border-color: rgba(200,90,30,0.4);  }

/* Unlock buttons */
.btn-unlock {
  background: linear-gradient(135deg, rgba(255,248,220,0.95), rgba(255,236,180,0.95));
  border: 1px solid rgba(210,150,60,0.55) !important;
  animation: unlockPulse 2s ease-in-out infinite;
}
.btn-unlock:hover:not(:disabled) {
  background: linear-gradient(135deg, rgba(255,252,235,1), rgba(255,244,195,1));
  border-color: rgba(200,130,40,0.8) !important;
}
@keyframes unlockPulse {
  0%, 100% { box-shadow: 0 3px 10px rgba(200,140,40,0.15), 0 0 0 0 rgba(210,150,60,0.4); }
  50%       { box-shadow: 0 3px 10px rgba(200,140,40,0.25), 0 0 0 6px rgba(210,150,60,0); }
}

/* Growth badge */
#growth-chip {
  position: absolute; top: 134px; left: 16px;
  background: rgba(255,248,235,0.8);
  border: 1px solid rgba(180,130,70,0.2);
  border-radius: 24px; padding: 5px 14px;
  color: #7a9a50; font-size: 12px;
  backdrop-filter: blur(6px);
}

/* Personality chip */
#personality-chip {
  position: absolute; top: 172px; left: 16px;
  background: rgba(255,248,235,0.8);
  border: 1px solid rgba(180,130,70,0.2);
  border-radius: 24px; padding: 5px 14px;
  color: #9a6a2a; font-size: 12px;
  backdrop-filter: blur(6px);
}

/* Choice buttons */
#popup-choices {
  display: none; gap: 10px; margin-top: 18px;
}
.choice-btn {
  flex: 1; justify-content: center;
  font-size: 13px; padding: 10px 12px;
  background: rgba(255,248,235,0.95) !important;
  border-color: rgba(180,130,70,0.4) !important;
  border-radius: 14px !important;
  cursor: pointer; transition: all 0.18s;
  font-family: inherit; color: #7a4520;
  box-shadow: 0 2px 8px rgba(120,70,20,0.1);
}
.choice-btn:hover {
  background: rgba(255,236,195,0.98) !important;
  border-color: rgba(200,140,60,0.65) !important;
  transform: translateY(-2px);
  box-shadow: 0 5px 16px rgba(120,70,20,0.18) !important;
}
.choice-btn.chosen {
  background: linear-gradient(135deg, rgba(200,150,60,0.2), rgba(220,170,80,0.25)) !important;
  border-color: rgba(200,140,50,0.7) !important;
}
#popup-result {
  display: none;
  margin-top: 14px; padding: 12px 16px;
  background: rgba(180,130,70,0.08);
  border-left: 3px solid #c8903a;
  border-radius: 0 10px 10px 0;
  font-size: 13px; color: #7a5030; line-height: 1.8;
}

/* Particles */
.particle {
  position: fixed; pointer-events: none; font-size: 22px;
  animation: floatUp 1.4s cubic-bezier(0.2,0.8,0.6,1) forwards;
  z-index: 200;
}
@keyframes floatUp {
  0%   { transform: translateY(0) scale(0.8) rotate(-5deg); opacity: 1; }
  60%  { opacity: 1; }
  100% { transform: translateY(-100px) scale(1.3) rotate(8deg); opacity: 0; }
}

/* ─── Main Menu ─────────────────────────────────────────────────────────────── */
#main-menu {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: #c8a97e;
  background-image:
    radial-gradient(ellipse at 30% 20%, #d4b896 0%, transparent 60%),
    radial-gradient(ellipse at 70% 80%, #b8956a 0%, transparent 60%);
  z-index: 300;
  padding: 24px;
}
#main-menu.hide { display: none; }
#menu-box {
  background: linear-gradient(150deg, #fffaf0 0%, #fff8e8 60%, #fef3d8 100%);
  border: 1px solid rgba(180,130,70,0.35);
  border-radius: 32px;
  padding: 48px 52px;
  max-width: 400px; width: 100%;
  text-align: center;
  box-shadow: 0 32px 80px rgba(100,50,10,0.3), inset 0 1px 0 rgba(255,255,255,0.95);
  animation: popIn 0.45s cubic-bezier(.34,1.56,.64,1);
}
#menu-cat { font-size: 64px; margin-bottom: 8px; }
#menu-title {
  font-size: 22px; font-weight: 700; color: #8b4513;
  margin-bottom: 4px; letter-spacing: 1px;
}
#menu-sub {
  font-size: 12px; color: #b08050; margin-bottom: 36px; letter-spacing: 0.5px;
}
#menu-save-info {
  font-size: 12px; color: #a07040;
  background: rgba(180,130,70,0.1);
  border-radius: 10px; padding: 8px 14px;
  margin-bottom: 24px; line-height: 1.7;
  display: none;
}
.menu-btn {
  display: block; width: 100%;
  margin-bottom: 12px;
  padding: 14px 20px;
  border-radius: 18px; border: 1px solid rgba(180,130,70,0.35);
  background: rgba(255,248,235,0.95);
  color: #7a4520; font-size: 15px; font-weight: 600;
  font-family: inherit; cursor: pointer;
  transition: all 0.18s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 3px 10px rgba(120,70,20,0.1);
  letter-spacing: 0.5px;
}
.menu-btn:last-child { margin-bottom: 0; }
.menu-btn:hover { background: rgba(255,242,210,0.98); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(120,70,20,0.18); }
.menu-btn:active { transform: translateY(0); }
.menu-btn.primary {
  background: linear-gradient(135deg, #c47830, #a85e20);
  border-color: transparent; color: #fff8ee;
  box-shadow: 0 4px 14px rgba(140,70,10,0.35);
}
.menu-btn.primary:hover { opacity: 0.9; }
.menu-btn.danger { color: #b04030; border-color: rgba(180,80,60,0.3); }
.menu-btn.danger:hover { background: rgba(255,235,230,0.98); border-color: rgba(180,80,60,0.5); }

/* ─── Name input dialog ───────────────────────────────────────────────────── */
#name-dialog {
  position: fixed; inset: 0;
  display: none; align-items: center; justify-content: center;
  background: rgba(80,40,10,0.55);
  z-index: 350;
  backdrop-filter: blur(6px);
  padding: 16px;
}
#name-dialog.show { display: flex; }
#name-box {
  background: linear-gradient(150deg, #fffaf0 0%, #fff8e8 60%, #fef3d8 100%);
  border: 1px solid rgba(180,130,70,0.35);
  border-radius: 24px;
  padding: 36px 40px;
  max-width: 380px; width: 100%;
  text-align: center;
  box-shadow: 0 32px 80px rgba(100,50,10,0.35);
  animation: popIn 0.35s cubic-bezier(.34,1.56,.64,1);
}
#name-icon { font-size: 50px; margin-bottom: 6px; }
#name-title { font-size: 18px; font-weight: 700; color: #8b4513; margin-bottom: 6px; }
#name-sub { font-size: 12px; color: #b08050; margin-bottom: 20px; }
#name-input {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid rgba(180,130,70,0.4);
  border-radius: 12px;
  font-size: 15px;
  font-family: inherit;
  color: #5a3010;
  background: rgba(255,255,255,0.7);
  outline: none;
  text-align: center;
}
#name-input:focus { border-color: rgba(200,140,60,0.8); box-shadow: 0 0 0 3px rgba(200,140,60,0.15); }
#name-counter { font-size: 11px; color: #b08050; margin-top: 6px; text-align: right; }
#name-confirm {
  margin-top: 20px; width: 100%;
  background: linear-gradient(135deg, #c47830, #a85e20);
  border: none; border-radius: 14px;
  color: #fff8ee; font-size: 15px; padding: 12px;
  cursor: pointer;
  font-family: inherit; font-weight: 600;
  letter-spacing: 0.5px;
  box-shadow: 0 4px 14px rgba(140,70,10,0.35);
}
#name-confirm:hover { opacity: 0.9; }
#name-confirm:disabled { opacity: 0.5; cursor: not-allowed; }

/* Cat name chip (top right) */
#name-chip {
  position: absolute; top: 16px; right: 16px;
  background: rgba(255,248,235,0.92);
  border: 1px solid rgba(180,130,70,0.35);
  border-radius: 24px;
  padding: 7px 16px;
  color: #7a4520; font-size: 13px; font-weight: 600;
  backdrop-filter: blur(8px);
  box-shadow: 0 4px 12px rgba(120,70,20,0.12);
  letter-spacing: 0.3px;
  max-width: 200px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  display: none;
}

/* Bond (intimacy) chip — big % */
#bond-chip {
  position: absolute; top: 56px; right: 16px;
  background: linear-gradient(135deg, rgba(255,240,220,0.95), rgba(255,225,195,0.95));
  border: 1px solid rgba(220,140,80,0.45);
  border-radius: 22px;
  padding: 8px 18px;
  color: #b04050; font-size: 22px; font-weight: 800;
  backdrop-filter: blur(8px);
  box-shadow: 0 4px 14px rgba(180,80,40,0.18);
  letter-spacing: 0.5px;
  display: flex; align-items: center; gap: 6px;
  transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
}
#bond-chip .bond-label { font-size: 11px; color: #8b5e3c; font-weight: 600; letter-spacing: 0.3px; }
#bond-chip .bond-pct { font-size: 22px; font-weight: 800; }
#bond-chip.bump { animation: bondBump 0.5s cubic-bezier(.34,1.56,.64,1); }
@keyframes bondBump {
  0%   { transform: scale(1); }
  35%  { transform: scale(1.18); }
  100% { transform: scale(1); }
}
.bond-delta {
  position: absolute; right: 14px; top: 100%;
  font-size: 13px; font-weight: 700;
  pointer-events: none;
  animation: bondDelta 1.2s ease-out forwards;
}
@keyframes bondDelta {
  0%   { transform: translateY(-4px); opacity: 0; }
  20%  { opacity: 1; }
  100% { transform: translateY(28px); opacity: 0; }
}

/* ─── Wish bubble (cat's wish) ─────────────────────────────────────────────── */
#wish-bubble {
  position: absolute; bottom: 80px; left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(135deg, rgba(255,245,220,0.98), rgba(255,230,195,0.98));
  border: 2px solid rgba(220,140,80,0.5);
  border-radius: 22px;
  padding: 14px 22px 10px;
  min-width: 240px; max-width: 360px;
  color: #6b3a1a;
  font-size: 13px; line-height: 1.5;
  box-shadow: 0 8px 24px rgba(180,80,30,0.25);
  z-index: 40;
  display: none;
  animation: wishIn 0.4s cubic-bezier(.34,1.56,.64,1);
}
#wish-bubble.show { display: block; }
#wish-bubble::before {
  content: ''; position: absolute;
  left: 50%; bottom: -10px; transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 10px solid transparent; border-right: 10px solid transparent;
  border-top: 10px solid rgba(220,140,80,0.5);
}
#wish-bubble::after {
  content: ''; position: absolute;
  left: 50%; bottom: -7px; transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 8px solid transparent; border-right: 8px solid transparent;
  border-top: 8px solid rgba(255,245,220,1);
}
.wish-head {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 6px;
  font-weight: 700; color: #b04030;
}
.wish-icon { font-size: 22px; }
.wish-text { font-size: 13px; line-height: 1.5; color: #6b3a1a; }
.wish-timer {
  margin-top: 8px; height: 4px;
  background: rgba(180,130,70,0.18); border-radius: 2px;
  overflow: hidden;
}
.wish-timer-fill {
  height: 100%; background: linear-gradient(90deg, #e89040, #d4604a);
  width: 100%; transition: width 0.3s linear;
  border-radius: 2px;
}
@keyframes wishIn {
  from { opacity: 0; transform: translateX(-50%) translateY(8px) scale(0.9); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
}

/* ─── In-game top-right controls ────────────────────────────────────────────── */
#game-controls {
  position: absolute; top: 16px; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 7px;
  z-index: 10;
}
.ctrl-btn {
  background: rgba(255,248,235,0.88);
  border: 1px solid rgba(180,130,70,0.3);
  border-radius: 18px; padding: 5px 11px;
  color: #8b5e3c; font-size: 11px; cursor: pointer;
  font-family: inherit;
  backdrop-filter: blur(8px);
  box-shadow: 0 3px 10px rgba(120,70,20,0.1);
  transition: all 0.15s;
  white-space: nowrap;
}
.ctrl-btn:hover { background: rgba(255,242,210,0.98); transform: translateY(-1px); }

/* ─── Audio Panel ──────────────────────────────────────────────────────────── */
#audio-panel {
  position: absolute; top: 56px; left: 50%;
  transform: translateX(-50%);
  background: rgba(255,248,235,0.97);
  border: 1px solid rgba(180,130,70,0.4);
  border-radius: 18px;
  padding: 16px 20px;
  min-width: 280px;
  z-index: 20;
  box-shadow: 0 12px 32px rgba(120,70,20,0.22);
  backdrop-filter: blur(10px);
  display: none;
}
#audio-panel.show { display: block; animation: popIn 0.25s cubic-bezier(.34,1.56,.64,1); }
.audio-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px;
  font-size: 12px; color: #6b4226;
}
.audio-row:last-child { margin-bottom: 0; }
.audio-row label { width: 60px; font-weight: 600; color: #8b5e3c; flex-shrink: 0; }
.audio-row input[type="range"] {
  flex: 1; height: 4px;
  -webkit-appearance: none; appearance: none;
  background: rgba(180,130,70,0.18);
  border-radius: 2px; outline: none;
}
.audio-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 14px; height: 14px;
  background: #c47830;
  border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 2px 4px rgba(140,70,10,0.3);
}
.audio-row input[type="range"]::-moz-range-thumb {
  width: 14px; height: 14px;
  background: #c47830;
  border: none; border-radius: 50%;
  cursor: pointer;
}
.audio-row .audio-val { width: 36px; text-align: right; color: #a07050; font-size: 11px; }
.audio-track-row { display: flex; align-items: center; gap: 8px; }
.audio-track-row #bgm-name { flex: 1; font-weight: 600; color: #7a4520; }
.audio-track-row .track-btn {
  background: rgba(255,236,180,0.9);
  border: 1px solid rgba(180,130,70,0.4);
  border-radius: 14px; padding: 4px 12px;
  font-size: 11px; color: #7a4520; cursor: pointer;
  font-family: inherit;
}
.audio-track-row .track-btn:hover { background: rgba(255,225,160,1); }

/* ─── Photo Album ─────────────────────────────────────────────────────────── */
#album-panel {
  position: fixed; inset: 0;
  display: none; align-items: center; justify-content: center;
  background: rgba(80,40,10,0.6);
  backdrop-filter: blur(8px);
  z-index: 250;
  padding: 24px;
}
#album-panel.show { display: flex; }
#album-box {
  background: linear-gradient(150deg, #fffaf0 0%, #fff8e8 60%, #fef3d8 100%);
  border: 1px solid rgba(180,130,70,0.35);
  border-radius: 24px;
  padding: 28px 32px 24px;
  max-width: 720px; width: 100%;
  max-height: 88vh;
  overflow-y: auto;
  box-shadow: 0 32px 80px rgba(100,50,10,0.35);
  animation: popIn 0.35s cubic-bezier(.34,1.56,.64,1);
}
#album-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px;
}
#album-title { font-size: 20px; font-weight: 700; color: #8b4513; letter-spacing: 0.5px; }
#album-close {
  background: rgba(180,130,70,0.15);
  border: 1px solid rgba(180,130,70,0.3);
  border-radius: 50%;
  width: 32px; height: 32px;
  cursor: pointer; color: #8b5e3c; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
}
#album-close:hover { background: rgba(180,130,70,0.3); }
#album-empty {
  text-align: center; padding: 40px 20px;
  color: #a07050; font-size: 13px; line-height: 2;
}
#album-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 14px;
}
.album-card {
  background: #fff;
  border: 1px solid rgba(180,130,70,0.3);
  border-radius: 12px;
  padding: 8px;
  box-shadow: 0 4px 12px rgba(120,70,20,0.12);
  transition: transform 0.18s;
  position: relative;
}
.album-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(120,70,20,0.2); }
.album-card img { width: 100%; border-radius: 8px; display: block; }
.album-card .card-info {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 6px; font-size: 11px; color: #7a5030;
}
.album-card .card-actions {
  position: absolute; top: 12px; right: 12px;
  display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s;
}
.album-card:hover .card-actions { opacity: 1; }
.album-card .card-btn {
  width: 24px; height: 24px;
  background: rgba(255,255,255,0.92);
  border: 1px solid rgba(180,130,70,0.4);
  border-radius: 50%; cursor: pointer; font-size: 11px;
  display: flex; align-items: center; justify-content: center;
}
.album-card .card-btn:hover { background: rgba(255,236,180,0.98); }

/* photo flash effect */
#flash {
  position: fixed; inset: 0;
  background: white; opacity: 0;
  pointer-events: none; z-index: 400;
}
#flash.show { animation: flashAnim 0.4s ease-out; }
@keyframes flashAnim {
  0%   { opacity: 0; }
  20%  { opacity: 0.85; }
  100% { opacity: 0; }
}

/* ─── Achievements ────────────────────────────────────────────────────────── */
#ach-panel {
  position: fixed; inset: 0;
  display: none; align-items: center; justify-content: center;
  background: rgba(80,40,10,0.6);
  backdrop-filter: blur(8px);
  z-index: 250;
  padding: 24px;
}
#ach-panel.show { display: flex; }
#ach-box {
  background: linear-gradient(150deg, #fffaf0 0%, #fff8e8 60%, #fef3d8 100%);
  border: 1px solid rgba(180,130,70,0.35);
  border-radius: 24px;
  padding: 28px 32px 24px;
  max-width: 600px; width: 100%;
  max-height: 88vh;
  overflow-y: auto;
  box-shadow: 0 32px 80px rgba(100,50,10,0.35);
  animation: popIn 0.35s cubic-bezier(.34,1.56,.64,1);
}
#ach-progress {
  font-size: 13px; color: #b08050;
  margin-bottom: 16px;
}
.ach-item {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 14px;
  margin-bottom: 8px;
  background: rgba(255,250,240,0.5);
  border: 1px solid rgba(180,130,70,0.2);
  border-radius: 14px;
  transition: all 0.2s;
}
.ach-item.locked { opacity: 0.45; filter: grayscale(0.7); }
.ach-item.unlocked {
  background: linear-gradient(135deg, rgba(255,240,210,0.9), rgba(255,228,180,0.9));
  border-color: rgba(220,150,60,0.5);
}
.ach-icon { font-size: 32px; flex-shrink: 0; }
.ach-info { flex: 1; min-width: 0; }
.ach-name { font-size: 14px; font-weight: 700; color: #8b4513; margin-bottom: 2px; }
.ach-desc { font-size: 11px; color: #8b5e3c; line-height: 1.5; }
.ach-status {
  font-size: 11px; color: #c47830;
  flex-shrink: 0;
}

/* Achievement unlock popup (bottom-right slide-in) */
#ach-toast {
  position: fixed; right: 24px; bottom: 24px;
  background: linear-gradient(135deg, #fff8e0, #ffe5b8);
  border: 2px solid rgba(220,150,60,0.6);
  border-radius: 16px;
  padding: 14px 18px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: 0 12px 36px rgba(180,90,30,0.3);
  z-index: 220;
  transform: translateX(120%);
  transition: transform 0.5s cubic-bezier(.34,1.56,.64,1);
  min-width: 280px;
}
#ach-toast.show { transform: translateX(0); }
#ach-toast .at-icon { font-size: 30px; }
#ach-toast .at-content { flex: 1; }
#ach-toast .at-label { font-size: 10px; color: #a85e20; letter-spacing: 1px; font-weight: 700; }
#ach-toast .at-name  { font-size: 14px; font-weight: 700; color: #6b3a1a; }

/* ─── Play Mini-game ──────────────────────────────────────────────────────── */
#play-overlay {
  position: absolute; inset: 0;
  pointer-events: none;
  z-index: 30;
  display: none;
}
#play-overlay.active {
  display: block;
  pointer-events: auto;
  cursor: none;
}
#play-hud {

#play-instr {

  width: 6px; height: 6px;

}
</style>
</head>

<script>
// no image loading needed — cat is fully code-drawn

// ─── Game state ───────────────────────────────────────────────────────────────
const STATS = { trust: 20, health: 80, hunger: 60 };
let month = 1, gameOver = false;   // 1–12 months
let eventLock = false;
let actionsToday = 0;
let catMood = 'neutral';
let catName = '';

// ─── Personality system ───────────────────────────────────────────────────────
const PERSONALITIES = {
  shy:    {
    name:'🙈 胆小猫',
    desc:'它比一般猫咪更敏感，建立信任需要更多耐心——但一旦信任你，就不会轻易离开。',
    trustMult: 0.7, playMult: 1.0, sleepMult: 1.0, feedMult: 1.0, wanderBonus: -0.1,
  },
  lively: {
    name:'🐾 活泼猫',
    desc:'它一进家门就开始到处乱跑！玩耍效果极好，但喂饭？它似乎不太感兴趣。',
    trustMult: 1.0, playMult: 1.4, sleepMult: 1.0, feedMult: 0.85, wanderBonus: 0.15,
  },
  lazy:   {
    name:'😴 慵懒猫',
    desc:'它找到最软的地方躺下，开始发呆。睡眠对它疗效加倍，但想让它玩耍可要费点劲。',
    trustMult: 1.0, playMult: 0.75, sleepMult: 1.5, feedMult: 1.0, wanderBonus: -0.15,
  },
};
let catPersonality = null; // assigned on first closePopup
let personalityIntroShown = false;

// ─── Wish system ──────────────────────────────────────────────────────────────
const WISH_DEFS = [
  { id:'feed',    icon:'🐟', text:'肚子有点饿了…',         action:'feed',    reward:12, hint:'(去喂喂它吧)' },
  { id:'water',   icon:'💧', text:'有点渴…想喝水。',       action:'water',   reward:10, hint:'(给它加点水)' },
  { id:'play',    icon:'🧶', text:'想玩毛线球！',           action:'play',    reward:14, hint:'(陪它玩玩吧)' },
  { id:'scratch', icon:'🪵', text:'好想磨磨爪子！',         action:'scratch', reward:11, hint:'(让它去猫抓板)' },
  { id:'pet',     icon:'💕', text:'摸摸我嘛~',             action:'pet',     reward:12, hint:'(轻轻摸摸它)', minTrust:30 },
  { id:'sleep',   icon:'😴', text:'好困啊，想睡觉…',       action:'sleep',   reward:10, hint:'(让它休息一下)' },
  { id:'pet2',    icon:'😻', text:'想被你抱抱~',           action:'pet',     reward:16, hint:'(轻轻摸摸它)', minTrust:60 },
  { id:'play2',   icon:'⚡', text:'有股冲动想跑酷！',       action:'play',    reward:14, hint:'(陪它玩玩吧)', minTrust:50 },
];
let activeWish = null;
let wishTimer = 0;          // 剩余秒数
let wishCooldown = 35;      // 距离下一个心愿的冷却
const WISH_DURATION = 22;   // 心愿有效期

function maybeSpawnWish(dt) {
  if(gameOver || activeWish) return;
  wishCooldown -= dt;
  if(wishCooldown > 0) return;
  // 候选池：满足前置条件
  const pool = WISH_DEFS.filter(w => !w.minTrust || STATS.trust >= w.minTrust);
  if(!pool.length) { wishCooldown = 25; return; }
  const w = pool[Math.floor(Math.random() * pool.length)];
  activeWish = { ...w };
  wishTimer = WISH_DURATION;
  showWishBubble();
  sfx('unlock');
}

function showWishBubble() {
  const el = document.getElementById('wish-bubble');
  document.getElementById('wish-icon').textContent = activeWish.icon;
  document.getElementById('wish-title').textContent = (catName || '猫咪') + ' 的小心愿';
  document.getElementById('wish-text').textContent  = `「${activeWish.text}」 ${activeWish.hint}`;
  document.getElementById('wish-timer-fill').style.width = '100%';
  el.classList.add('show');
}

function hideWishBubble() {
  document.getElementById('wish-bubble').classList.remove('show');
}

function updateWish(dt) {
  if(!activeWish) {
    maybeSpawnWish(dt);
    return;
  }
  wishTimer -= dt;
  document.getElementById('wish-timer-fill').style.width =
    Math.max(0, (wishTimer / WISH_DURATION) * 100) + '%';
  if(wishTimer <= 0) {
    // 过期：小失望
    STATS.trust = Math.max(0, STATS.trust - 4);
    clampStats(); updateHUD(); updateStateChip();
    showToast('💧', `${catName || '猫咪'}的小心愿没被满足，它有点失望…`);
    activeWish = null;
    hideWishBubble();
    wishCooldown = 30 + Math.random() * 20;
  }
}

// 当玩家执行某个 action 时调用：满足心愿则大加信任
function tryFulfillWish(actionType) {
  if(!activeWish || activeWish.action !== actionType) return;
  STATS.trust = Math.min(100, STATS.trust + activeWish.reward);
  clampStats(); updateHUD(); updateStateChip();
  showToast('✨', `${catName || '猫咪'}的小心愿被满足了！+${activeWish.reward} 亲密度`);
  activeWish = null;
  hideWishBubble();
  wishCooldown = 40 + Math.random() * 30;
  try { wishesFulfilled++; saveAchievements(); checkAchievements(); } catch(e){}
}

const COOLDOWNS = { feed: 0, play: 0, pet: 0, sleep: 0, water: 0, scratch: 0 };
const CD_TIMES   = { feed: 8, play: 10, pet: 6, sleep: 20, water: 7, scratch: 9 };

const BOWL  = { x: 150, y: 410 };
const WATER = { x: 230, y: 425 };
const TOY   = { x: 600, y: 380 };
const BED   = { x: 420, y: 460 };
const SCRATCH = { x: 720, y: 380 };

const CAT = {
  x: 400, y: 340,
  state: 'idle', stateTimer: 3,
  walkFrame: 0, walkFrameTimer: 0,
  facingLeft: false, targetX: null, targetY: null,
  reactEmoji: '', glowColor: null,
  pose: 'stand',         // idle 时的姿势：stand/loaf/sit/lying/groom/stretch/yawn/lookback/halfsleep/playPounce/peek
  poseTimer: 0,          // 姿势持续时间
};

// 12 种 idle 姿势，权重决定出现频率
const POSES = [
  { id:'stand',     weight:14, minDur:2.5, maxDur:5 },   // 站立基本姿势
  { id:'loaf',      weight:10, minDur:6,   maxDur:12 },  // 面包姿（蹲坐缩起前爪）
  { id:'sit',       weight:10, minDur:5,   maxDur:10 },  // 端坐
  { id:'lying',     weight:8,  minDur:6,   maxDur:14 },  // 侧卧
  { id:'groom',     weight:7,  minDur:4,   maxDur:7 },   // 舔爪/理毛
  { id:'stretch',   weight:5,  minDur:2.5, maxDur:4 },   // 伸懒腰
  { id:'yawn',      weight:4,  minDur:1.5, maxDur:2.5 }, // 打哈欠
  { id:'lookback',  weight:5,  minDur:2.5, maxDur:5 },   // 回头看
  { id:'halfsleep', weight:6,  minDur:8,   maxDur:14 },  // 半睡眯眼
  { id:'playPounce',weight:4,  minDur:2,   maxDur:4 },   // 准备扑姿
  { id:'peek',      weight:5,  minDur:3,   maxDur:6 },   // 蹲低偷瞄
  { id:'belly',     weight:3,  minDur:5,   maxDur:9 },   // 翻肚皮（信任高才出现）
];

// ─── Growth stages ────────────────────────────────────────────────────────────
// catScale 随月份线性增长: 幼猫(1-3月)→少年猫(4-7月)→成年猫(8-12月)
function updateCatScale() {
  catScale = 0.52 + (month - 1) * (1.0 - 0.52) / 11;
  catScale = Math.min(1.0, Math.max(0.52, catScale));
}

function getGrowthLabel() {
  if(month <= 3)  return '🐾 幼猫期';
  if(month <= 7)  return '🌱 少年期';
  return '🐱 成年期';
}

// ─── Phase helper ─────────────────────────────────────────────────────────────
function getPhase() {
  if(month <= 4)  return 'stranger';   // 1-4月 陌生期
  if(month <= 8)  return 'curious';    // 5-8月 试探期
  return 'bonded';                     // 9-12月 亲密期
}

function drawWindow(c,x,y,w,h){
  c.fillStyle='#c8a060'; c.beginPath(); c.roundRect(x-8,y-8,w+16,h+16,6); c.fill();
  const sky=c.createLinearGradient(x,y,x,y+h);
  sky.addColorStop(0,'#b8d4e8'); sky.addColorStop(0.6,'#d4e8f0'); sky.addColorStop(1,'#e8f4e0');
  c.fillStyle=sky; c.beginPath(); c.roundRect(x,y,w,h,3); c.fill();
  c.fillStyle='rgba(80,120,60,0.35)';
  c.beginPath(); c.arc(x+40,y+h-10,50,0,Math.PI*2); c.fill();
  c.beginPath(); c.arc(x+80,y+h-20,40,0,Math.PI*2); c.fill();
  const sunG=c.createRadialGradient(x+w-30,y+25,0,x+w-30,y+25,40);
  sunG.addColorStop(0,'rgba(255,230,100,0.9)'); sunG.addColorStop(0.4,'rgba(255,210,80,0.4)'); sunG.addColorStop(1,'rgba(255,200,60,0)');
  c.fillStyle=sunG; c.fillRect(x,y,w,h);
  c.strokeStyle='#b89050'; c.lineWidth=3;
  c.beginPath(); c.moveTo(x+w/2,y); c.lineTo(x+w/2,y+h); c.moveTo(x,y+h*0.55); c.lineTo(x+w,y+h*0.55); c.stroke();
