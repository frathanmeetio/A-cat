// ─── Cat rendering ────────────────────────────────────────────────────────────
// catScale: 0.5=幼猫 → 1.0=成年猫，由外部根据月份控制
let catScale = 0.55;

// Tabby palette
const FUR1   = '#c8a06a';
const FUR2   = '#b08850';
const STRIPE = '#7a5030';
const BELLY  = '#f0ddb8';
const NOSE   = '#e87090';
const EYE    = '#3a6e28';

function drawCat(c, cat, trust) {
  const { x, y, state, walkFrame, facingLeft, reactEmoji, glowColor } = cat;
  const t = Date.now() / 1000;

  c.save();
  if(facingLeft) { c.translate(x,0); c.scale(-1,1); c.translate(-x,0); }

  // Shadow (scales with cat size)
  c.fillStyle = 'rgba(100,50,10,0.18)';
  c.beginPath();
  c.ellipse(x, y+6, 42*catScale, 13*catScale, 0, 0, Math.PI*2);
  c.fill();

  // Glow
  const gc = glowColor || (trust>=75 ? 'rgba(230,140,60,0.45)' : null);
  if(gc) { c.shadowColor=gc; c.shadowBlur=24; }

  c.save();
  c.translate(x, y);
  c.scale(catScale, catScale);

  if(state === 'sleep') {
    _drawSleep(c, 0, 0, t);
  } else if(state === 'idle') {
    _drawPose(c, 0, 0, cat.pose || 'stand', t);
  } else {
    _drawStanding(c, 0, 0, state, walkFrame, t);
  }

  c.restore();
  c.restore();

  // Reaction bubble
  if(reactEmoji) {
    const bx = facingLeft ? x-60 : x+60;
    const by = y - 85;
    c.save();
    c.fillStyle = 'rgba(255,249,235,0.95)';
    c.strokeStyle = 'rgba(180,120,50,0.4)'; c.lineWidth = 1.5;
    c.beginPath(); c.roundRect(bx-24, by-30, 48, 38, 14); c.fill(); c.stroke();
    c.fillStyle = 'rgba(255,249,235,0.95)';
    c.beginPath(); c.moveTo(bx-8,by+8); c.lineTo(bx,by+22); c.lineTo(bx+8,by+8); c.fill();
    c.font='24px serif'; c.textAlign='center'; c.textBaseline='middle';
    c.fillText(reactEmoji, bx, by-11);
    c.restore();
  }
}

function _drawStanding(c, cx, cy, state, walkFrame, t) {
  const isWalk = state==='walk';
  const isPlay = state==='play';
  const isEat  = state==='eat';
  const isReact= state==='react';
  const bob = state==='idle' ? Math.sin(t*1.9)*2 : 0;
  const legSwing = isWalk ? Math.sin(walkFrame*Math.PI)*7 : 0;

  // ── TAIL ── (更粗更卷，更有表现力)
  const tailWag = isReact ? Math.sin(t*7)*24 : isPlay ? Math.sin(t*4)*18 : Math.sin(t*1.3)*9;
  c.save();
  // 外层尾巴
  c.strokeStyle = FUR1; c.lineWidth = 13; c.lineCap = 'round'; c.lineJoin = 'round';
  c.beginPath();
  c.moveTo(cx+14, cy-4+bob);
  c.bezierCurveTo(cx+44, cy+4+bob, cx+58, cy-22+tailWag, cx+44, cy-50+tailWag);
  c.stroke();
  // 尾巴尖白色
  c.strokeStyle = BELLY; c.lineWidth = 6;
  c.beginPath();
  c.moveTo(cx+50, cy-36+tailWag); c.lineTo(cx+44, cy-50+tailWag);
  c.stroke();
  // 尾巴环纹
  c.fillStyle = STRIPE;
  [[cx+26,cy-2+bob,3.5],[cx+42,cy-18+tailWag*0.6,3.2],[cx+45,cy-36+tailWag,3]].forEach(([tx,ty,r])=>{
    c.beginPath(); c.arc(tx,ty,r,0,Math.PI*2); c.fill();
  });
  c.restore();

  // ── BACK LEGS ── (更短更圆，蹲坐感)
  c.fillStyle = FUR2;
  _roundRect(c, cx+4,  cy-2+bob, 13, 18+legSwing*0.4, 7); c.fill();
  _roundRect(c, cx+19, cy-2+bob, 13, 18-legSwing*0.4, 7); c.fill();
  // 后爪垫
  c.fillStyle = '#d8987a';
  c.beginPath(); c.ellipse(cx+10, cy+15+legSwing*0.4+bob, 7,4,0,0,Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(cx+25, cy+15-legSwing*0.4+bob, 7,4,0,0,Math.PI*2); c.fill();

  // ── BODY ── (更圆滚滚)
  const bodyY = cy - 16 + bob;
  const bodyG = c.createRadialGradient(cx-6, bodyY-12, 4, cx, bodyY+4, 36);
  bodyG.addColorStop(0, '#dcb880');
  bodyG.addColorStop(0.7, FUR1);
  bodyG.addColorStop(1, FUR2);
  c.fillStyle = bodyG;
  c.beginPath(); c.ellipse(cx, bodyY, 28, 30, 0, 0, Math.PI*2); c.fill();

  // 身上的虎斑条纹（更柔和）
  c.fillStyle = STRIPE; c.globalAlpha = 0.42;
  [[-12,bodyY-2,3,22,0.1],[-2,bodyY-2,3,24,0.02],[8,bodyY-2,3,22,-0.06],[16,bodyY,2.5,18,-0.15]].forEach(([ex,ey,rxx,ryy,rot])=>{
    c.beginPath(); c.ellipse(ex,ey,rxx,ryy,rot,0,Math.PI*2); c.fill();
  });
  c.globalAlpha = 1;

  // 肚皮（圆润大）
  c.fillStyle = BELLY;
  c.beginPath(); c.ellipse(cx-2, bodyY+8, 16, 18, 0, 0, Math.PI*2); c.fill();

  // ── FRONT LEGS ── (短而粗)
  const eatLean = isEat ? 8 : 0;
  c.fillStyle = FUR1;
  _roundRect(c, cx-19+eatLean, cy+2+bob, 13, 22-legSwing, 7); c.fill();
  _roundRect(c, cx+8+eatLean,  cy+2+bob, 13, 22+legSwing, 7); c.fill();
  // 前爪垫
  c.fillStyle = '#d8987a';
  c.beginPath(); c.ellipse(cx-13+eatLean, cy+24-legSwing+bob, 7,4,0,0,Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(cx+15+eatLean, cy+24+legSwing+bob, 7,4,0,0,Math.PI*2); c.fill();

  // 玩耍时举起一只前爪
  if(isPlay) {
    c.fillStyle = FUR1;
    _roundRect(c, cx-30, cy-22+bob, 12, 22, 6); c.fill();
    c.fillStyle = '#d8987a';
    c.beginPath(); c.ellipse(cx-24, cy-2+bob, 7,4,0,0,Math.PI*2); c.fill();
  }

  // ── HEAD ── (大头！chibi 风格)
  const headY = isEat ? cy-50+bob : cy-54+bob;
  const headTilt = isPlay ? 0.13 : isEat ? 0.22 : 0;
  c.save();
  c.translate(cx, headY);
  c.rotate(headTilt);

  // EARS（先画耳朵，因为比较大要在头后面）
  // 外耳廓：用三角形+圆角效果
  c.fillStyle = FUR2;
  // 左耳
  c.beginPath();
  c.moveTo(-22, -8);
  c.quadraticCurveTo(-26, -34, -10, -22);
  c.quadraticCurveTo(-6, -16, -22, -8);
  c.fill();
  // 右耳
  c.beginPath();
  c.moveTo(22, -8);
  c.quadraticCurveTo(26, -34, 10, -22);
  c.quadraticCurveTo(6, -16, 22, -8);
  c.fill();
  // 内耳粉色
  c.fillStyle = '#f5b8a0';
  c.beginPath();
  c.moveTo(-19, -10);
  c.quadraticCurveTo(-22, -28, -12, -20);
  c.quadraticCurveTo(-9, -16, -19, -10);
  c.fill();
  c.beginPath();
  c.moveTo(19, -10);
  c.quadraticCurveTo(22, -28, 12, -20);
  c.quadraticCurveTo(9, -16, 19, -10);
  c.fill();

  // 头部主体（更圆更大）
  const headG = c.createRadialGradient(-6, -8, 3, 0, 2, 28);
  headG.addColorStop(0, '#e0bc80');
  headG.addColorStop(0.7, FUR1);
  headG.addColorStop(1, FUR2);
  c.fillStyle = headG;
  c.beginPath(); c.ellipse(0, 0, 26, 24, 0, 0, Math.PI*2); c.fill();

  // 头部条纹（M字额纹 + 脸颊）
  c.fillStyle = STRIPE; c.globalAlpha = 0.42;
  // 额头三道
  c.beginPath(); c.ellipse(-7, -10, 2.2, 8, 0.3, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse( 0, -12, 2.2, 9, 0,   0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse( 7, -10, 2.2, 8,-0.3, 0, Math.PI*2); c.fill();
  c.globalAlpha = 1;

  // 脸颊蓬松绒毛
  c.fillStyle = BELLY; c.globalAlpha = 0.55;
  c.beginPath(); c.ellipse(-19, 6, 9, 7, -0.3, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse( 19, 6, 9, 7,  0.3, 0, Math.PI*2); c.fill();
  c.globalAlpha = 1;

  // 下巴白色
  c.fillStyle = BELLY; c.globalAlpha = 0.7;
  c.beginPath(); c.ellipse(0, 10, 12, 7, 0, 0, Math.PI*2); c.fill();
  c.globalAlpha = 1;

  // ── EYES ── (大眼睛！更圆更萌)
  const blinkFactor = (Math.sin(t*0.6) > 0.96 || isEat) ? 0.12 : 1;
  const eyeShape = isPlay ? 1.05 : 1; // 玩耍时眼睛圆一点
  // 眼眶（深色描边）
  c.fillStyle = '#1a0e08';
  c.beginPath(); c.ellipse(-9, -1, 7.5*eyeShape, 8*blinkFactor, -0.05, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse( 9, -1, 7.5*eyeShape, 8*blinkFactor,  0.05, 0, Math.PI*2); c.fill();

  if(blinkFactor > 0.3) {
    // 虹膜（绿色，渐变更生动）
    const irisG1 = c.createRadialGradient(-9, -2, 1, -9, 0, 7);
    irisG1.addColorStop(0, '#5a9e38');
    irisG1.addColorStop(1, '#2a5818');
    c.fillStyle = irisG1;
    c.beginPath(); c.ellipse(-9, -1, 6*eyeShape, 7*blinkFactor, 0, 0, Math.PI*2); c.fill();
    const irisG2 = c.createRadialGradient(9, -2, 1, 9, 0, 7);
    irisG2.addColorStop(0, '#5a9e38');
    irisG2.addColorStop(1, '#2a5818');
    c.fillStyle = irisG2;
    c.beginPath(); c.ellipse( 9, -1, 6*eyeShape, 7*blinkFactor, 0, 0, Math.PI*2); c.fill();

    // 竖直瞳孔（开心时圆一点，警惕时窄）
    const pupilW = STATS.trust >= 50 ? 2.6 : 1.8;
    c.fillStyle = '#0a0a08';
    c.beginPath(); c.ellipse(-9, -1, pupilW, 6*blinkFactor, 0, 0, Math.PI*2); c.fill();
    c.beginPath(); c.ellipse( 9, -1, pupilW, 6*blinkFactor, 0, 0, Math.PI*2); c.fill();

    // 大高光（萌化关键）
    c.fillStyle = 'rgba(255,255,255,0.95)';
    c.beginPath(); c.ellipse(-7, -4, 2.5, 3, -0.3, 0, Math.PI*2); c.fill();
    c.beginPath(); c.ellipse(11, -4, 2.5, 3, -0.3, 0, Math.PI*2); c.fill();
    // 第二个小高光
    c.fillStyle = 'rgba(255,255,255,0.7)';
    c.beginPath(); c.arc(-10, 2, 1.3, 0, Math.PI*2); c.fill();
    c.beginPath(); c.arc( 8, 2, 1.3, 0, Math.PI*2); c.fill();
  }

  // ── NOSE ── (更小巧，倒三角)
  c.fillStyle = NOSE;
  c.beginPath();
  c.moveTo(0, 8);
  c.bezierCurveTo(-3.5, 5, -4, 2, -2, 1.5);
  c.bezierCurveTo(-0.8, 1, 0, 2, 0, 3);
  c.bezierCurveTo( 0, 2, 0.8, 1, 2, 1.5);
  c.bezierCurveTo( 4, 2, 3.5, 5, 0, 8);
  c.fill();

  // 鼻梁阴影线
  c.strokeStyle = 'rgba(120,60,30,0.3)'; c.lineWidth = 1;
  c.beginPath(); c.moveTo(0, 8); c.lineTo(0, 11); c.stroke();

  // ── MOUTH ── (更圆的:3嘴型)
  c.strokeStyle = '#5a3018'; c.lineWidth = 1.4; c.lineCap = 'round';
  c.beginPath();
  c.moveTo(0, 11);
  c.quadraticCurveTo(-2, 14, -6, 12);
  c.stroke();
  c.beginPath();
  c.moveTo(0, 11);
  c.quadraticCurveTo(2, 14, 6, 12);
  c.stroke();

  // ── WHISKERS ── (更细更长)
  c.strokeStyle = 'rgba(250,235,200,0.85)'; c.lineWidth = 0.9; c.lineCap = 'round';
  [[-5,5,-32,2],[-5,8,-30,8],[-5,11,-28,14],
   [ 5,5, 32,2],[ 5,8, 30,8],[ 5,11, 28,14]].forEach(([x1,y1,x2,y2])=>{
    c.beginPath(); c.moveTo(x1,y1); c.lineTo(x2,y2); c.stroke();
  });

  c.restore();
}

function _drawSleep(c, cx, cy, t) {
  // Curled body
  const bodyG = c.createRadialGradient(cx,cy-12,5, cx,cy-8,38);
  bodyG.addColorStop(0,FUR1); bodyG.addColorStop(1,FUR2);
  c.fillStyle = bodyG;
  c.beginPath(); c.ellipse(cx, cy-10, 40, 23, 0,0,Math.PI*2); c.fill();

  // stripes
  c.fillStyle = STRIPE; c.globalAlpha = 0.42;
  [-13,0,13].forEach(ox=>{
    c.beginPath(); c.ellipse(cx+ox, cy-10, 3.2,21, ox*0.05,0,Math.PI*2); c.fill();
  });
  c.globalAlpha = 1;

  // belly patch
  c.fillStyle = BELLY; c.globalAlpha = 0.7;
  c.beginPath(); c.ellipse(cx-4, cy-8, 16, 15, 0.2,0,Math.PI*2); c.fill();
  c.globalAlpha = 1;

  // head resting (right side)
  const headG = c.createRadialGradient(cx+22,cy-10,3, cx+25,cy-8,20);
  headG.addColorStop(0,'#dab87c'); headG.addColorStop(1,FUR2);
  c.fillStyle = headG;
  c.beginPath(); c.ellipse(cx+27, cy-8, 18, 15, 0.25,0,Math.PI*2); c.fill();

  // cheek fluff
  c.fillStyle = BELLY; c.globalAlpha = 0.4;
  c.beginPath(); c.ellipse(cx+14, cy-4, 7,5,-0.3,0,Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(cx+38, cy-6, 7,5, 0.3,0,Math.PI*2); c.fill();
  c.globalAlpha = 1;

  // ears
  c.fillStyle = FUR2;
  c.beginPath(); c.moveTo(cx+17,-2+cy); c.lineTo(cx+13,-18+cy); c.lineTo(cx+25,-5+cy); c.closePath(); c.fill();
  c.beginPath(); c.moveTo(cx+31,-1+cy); c.lineTo(cx+35,-16+cy); c.lineTo(cx+40,-3+cy); c.closePath(); c.fill();
  c.fillStyle = '#f0a080';
  c.beginPath(); c.moveTo(cx+18,cy);   c.lineTo(cx+15,-14+cy); c.lineTo(cx+24,-4+cy); c.closePath(); c.fill();
  c.beginPath(); c.moveTo(cx+32,cy-1); c.lineTo(cx+34,-13+cy); c.lineTo(cx+39,-2+cy); c.closePath(); c.fill();

  // closed eyes (happy arcs)
  c.strokeStyle = '#5a3010'; c.lineWidth = 2; c.lineCap = 'round';
  c.beginPath(); c.arc(cx+22, cy-8, 5, Math.PI*1.15, Math.PI*1.85); c.stroke();
  c.beginPath(); c.arc(cx+33, cy-7, 4.5,Math.PI*1.15,Math.PI*1.85); c.stroke();
  // tiny eyelash dots
  c.fillStyle = '#5a3010';
  c.beginPath(); c.arc(cx+19, cy-12, 1, 0,Math.PI*2); c.fill();
  c.beginPath(); c.arc(cx+25, cy-13, 1, 0,Math.PI*2); c.fill();

  // nose
  c.fillStyle = NOSE;
  c.beginPath(); c.moveTo(cx+26,cy-2); c.bezierCurveTo(cx+22,cy-5,cx+22,cy-7,cx+25,cy-7); c.bezierCurveTo(cx+26,cy-7,cx+26,cy-6,cx+26,cy-5); c.bezierCurveTo(cx+26,cy-6,cx+26,cy-7,cx+27,cy-7); c.bezierCurveTo(cx+30,cy-7,cx+30,cy-5,cx+26,cy-2); c.fill();

  // tail curled around left
  c.strokeStyle = FUR1; c.lineWidth = 9; c.lineCap = 'round';
  c.beginPath();
  c.moveTo(cx-12, cy+10);
  c.bezierCurveTo(cx-42,cy+16, cx-46,cy-8, cx-30,cy-22);
  c.stroke();
  c.strokeStyle = BELLY; c.lineWidth = 4;
  c.beginPath(); c.moveTo(cx-40,cy+6); c.lineTo(cx-30,cy-22); c.stroke();

  // paws
  c.fillStyle = FUR1;
  c.beginPath(); c.ellipse(cx+15, cy+10, 14,7, 0.1,0,Math.PI*2); c.fill();
  c.fillStyle = NOSE; c.globalAlpha = 0.65;
  [-6,-1,4].forEach(ox=>{ c.beginPath(); c.arc(cx+10+ox,cy+13,2.5,0,Math.PI*2); c.fill(); });
  c.globalAlpha = 1;

  // ZZZ floating
  const za = 0.55 + Math.sin(t*1.4)*0.3;
  c.font = 'bold 14px serif'; c.textAlign = 'left'; c.textBaseline = 'alphabetic';
  c.fillStyle = `rgba(120,80,30,${za})`; c.fillText('z', cx+44, cy-26);
  c.font = 'bold 11px serif';
  c.fillStyle = `rgba(120,80,30,${za*0.7})`; c.fillText('z', cx+56, cy-38);
  c.font = 'bold 9px serif';
  c.fillStyle = `rgba(120,80,30,${za*0.4})`; c.fillText('z', cx+64, cy-48);
}

// ─── Pose dispatcher ──────────────────────────────────────────────────────────
function _drawPose(c, cx, cy, pose, t) {
  switch(pose) {
    case 'loaf':       _drawLoaf(c, cx, cy, t); break;
    case 'sit':        _drawSit(c, cx, cy, t); break;
    case 'lying':      _drawLying(c, cx, cy, t); break;
    case 'groom':      _drawGroom(c, cx, cy, t); break;
    case 'stretch':    _drawStretch(c, cx, cy, t); break;
    case 'yawn':       _drawYawn(c, cx, cy, t); break;
    case 'lookback':   _drawLookback(c, cx, cy, t); break;
    case 'halfsleep':  _drawHalfsleep(c, cx, cy, t); break;
    case 'playPounce': _drawPounce(c, cx, cy, t); break;
    case 'peek':       _drawPeek(c, cx, cy, t); break;
    case 'belly':      _drawBelly(c, cx, cy, t); break;
    default:           _drawStanding(c, cx, cy, 'idle', 0, t);
  }
}

// 通用头部绘制（很多姿势都用得到）
// scale: 头部缩放，eyesClosed: 0~1（0全开1全闭），blush: 是否有腮红
function _drawCatHead(c, hx, hy, opts) {
  const o = opts || {};
  const scale = o.scale || 1;
  const closed = o.eyesClosed || 0;       // 0..1
  const lookDir = o.lookDir || 0;         // -1 左 / 0 中 / 1 右
  const mouthOpen = o.mouthOpen || 0;     // 0..1
  const earTilt = o.earTilt || 0;         // -1 平贴 / 0 普通 / 1 警觉
  const tilt = o.tilt || 0;
  const t = o.t || 0;

  c.save();
  c.translate(hx, hy);
  c.rotate(tilt);
  c.scale(scale, scale);

  // 耳朵（先画因为大）
  c.fillStyle = FUR2;
  // 左耳
  c.beginPath();
  if(earTilt < -0.5) {
    // 平贴模式
    c.moveTo(-22, -2);
    c.quadraticCurveTo(-24, -16, -10, -14);
    c.quadraticCurveTo(-6, -8, -22, -2);
  } else {
    c.moveTo(-22, -8 + earTilt*-2);
    c.quadraticCurveTo(-26, -34 + earTilt*-4, -10, -22);
    c.quadraticCurveTo(-6, -16, -22, -8 + earTilt*-2);
  }
  c.fill();
  // 右耳
  c.beginPath();
  if(earTilt < -0.5) {
    c.moveTo(22, -2);
    c.quadraticCurveTo(24, -16, 10, -14);
    c.quadraticCurveTo(6, -8, 22, -2);
  } else {
    c.moveTo(22, -8 + earTilt*-2);
    c.quadraticCurveTo(26, -34 + earTilt*-4, 10, -22);
    c.quadraticCurveTo(6, -16, 22, -8 + earTilt*-2);
  }
  c.fill();
  // 内耳
  c.fillStyle = '#f5b8a0';
  if(earTilt >= -0.5) {
    c.beginPath();
    c.moveTo(-19, -10 + earTilt*-2);
    c.quadraticCurveTo(-22, -28 + earTilt*-3, -12, -20);
    c.quadraticCurveTo(-9, -16, -19, -10 + earTilt*-2);
    c.fill();
    c.beginPath();
    c.moveTo(19, -10 + earTilt*-2);
    c.quadraticCurveTo(22, -28 + earTilt*-3, 12, -20);
    c.quadraticCurveTo(9, -16, 19, -10 + earTilt*-2);
    c.fill();
  }

  // 头部
  const headG = c.createRadialGradient(-6, -8, 3, 0, 2, 28);
  headG.addColorStop(0, '#e0bc80');
  headG.addColorStop(0.7, FUR1);
  headG.addColorStop(1, FUR2);
  c.fillStyle = headG;
  c.beginPath(); c.ellipse(0, 0, 26, 24, 0, 0, Math.PI*2); c.fill();

  // 头部条纹
  c.fillStyle = STRIPE; c.globalAlpha = 0.42;
  c.beginPath(); c.ellipse(-7, -10, 2.2, 8, 0.3, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse( 0, -12, 2.2, 9, 0,   0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse( 7, -10, 2.2, 8,-0.3, 0, Math.PI*2); c.fill();
  c.globalAlpha = 1;

  // 脸颊蓬松绒毛
  c.fillStyle = BELLY; c.globalAlpha = 0.55;
  c.beginPath(); c.ellipse(-19, 6, 9, 7, -0.3, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse( 19, 6, 9, 7,  0.3, 0, Math.PI*2); c.fill();
  c.globalAlpha = 1;

  // 下巴白色
  c.fillStyle = BELLY; c.globalAlpha = 0.7;
  c.beginPath(); c.ellipse(0, 10, 12, 7, 0, 0, Math.PI*2); c.fill();
  c.globalAlpha = 1;

  // 眼睛
  const eyeOpen = 1 - closed;
  if(closed >= 0.95) {
    // 全闭 — 弯弯笑眼
    c.strokeStyle = '#3a2010'; c.lineWidth = 1.8; c.lineCap = 'round';
    c.beginPath(); c.arc(-9, -1, 5, Math.PI*1.1, Math.PI*1.9); c.stroke();
    c.beginPath(); c.arc( 9, -1, 5, Math.PI*1.1, Math.PI*1.9); c.stroke();
  } else {
    // 眼眶
    c.fillStyle = '#1a0e08';
    c.beginPath(); c.ellipse(-9, -1, 7.5, 8*eyeOpen, -0.05, 0, Math.PI*2); c.fill();
    c.beginPath(); c.ellipse( 9, -1, 7.5, 8*eyeOpen,  0.05, 0, Math.PI*2); c.fill();
    if(eyeOpen > 0.3) {
      // 虹膜（绿色渐变）
      const irisG1 = c.createRadialGradient(-9, -2, 1, -9, 0, 7);
      irisG1.addColorStop(0, '#5a9e38');
      irisG1.addColorStop(1, '#2a5818');
      c.fillStyle = irisG1;
      c.beginPath(); c.ellipse(-9, -1, 6, 7*eyeOpen, 0, 0, Math.PI*2); c.fill();
      const irisG2 = c.createRadialGradient(9, -2, 1, 9, 0, 7);
      irisG2.addColorStop(0, '#5a9e38');
      irisG2.addColorStop(1, '#2a5818');
      c.fillStyle = irisG2;
      c.beginPath(); c.ellipse( 9, -1, 6, 7*eyeOpen, 0, 0, Math.PI*2); c.fill();
      // 瞳孔（lookDir 偏移）
      const pupilOffset = lookDir * 1.8;
      const pupilW = STATS.trust >= 50 ? 2.6 : 1.8;
      c.fillStyle = '#0a0a08';
      c.beginPath(); c.ellipse(-9 + pupilOffset, -1, pupilW, 6*eyeOpen, 0, 0, Math.PI*2); c.fill();
      c.beginPath(); c.ellipse( 9 + pupilOffset, -1, pupilW, 6*eyeOpen, 0, 0, Math.PI*2); c.fill();
      // 高光
      c.fillStyle = 'rgba(255,255,255,0.95)';
      c.beginPath(); c.ellipse(-7 + pupilOffset, -4, 2.5, 3*eyeOpen, -0.3, 0, Math.PI*2); c.fill();
      c.beginPath(); c.ellipse(11 + pupilOffset, -4, 2.5, 3*eyeOpen, -0.3, 0, Math.PI*2); c.fill();
    }
  }

  // 鼻子
  c.fillStyle = NOSE;
  c.beginPath();
  c.moveTo(0, 8);
  c.bezierCurveTo(-3.5, 5, -4, 2, -2, 1.5);
  c.bezierCurveTo(-0.8, 1, 0, 2, 0, 3);
  c.bezierCurveTo( 0, 2, 0.8, 1, 2, 1.5);
  c.bezierCurveTo( 4, 2, 3.5, 5, 0, 8);
  c.fill();
  c.strokeStyle = 'rgba(120,60,30,0.3)'; c.lineWidth = 1;
  c.beginPath(); c.moveTo(0, 8); c.lineTo(0, 11); c.stroke();

  // 嘴巴（mouthOpen=0时是闭嘴, =1 时打哈欠）
  c.strokeStyle = '#5a3018'; c.lineWidth = 1.4; c.lineCap = 'round';
  if(mouthOpen > 0.3) {
    // 张嘴（打哈欠）
    c.fillStyle = '#7a3520';
    c.beginPath();
    c.ellipse(0, 14, 5, 4 * mouthOpen, 0, 0, Math.PI*2);
    c.fill();
    // 牙齿小点
    c.fillStyle = '#fff';
    c.beginPath(); c.arc(-2, 12, 0.8, 0, Math.PI*2); c.fill();
    c.beginPath(); c.arc(2, 12, 0.8, 0, Math.PI*2); c.fill();
  } else {
    c.beginPath();
    c.moveTo(0, 11);
    c.quadraticCurveTo(-2, 14, -6, 12);
    c.stroke();
    c.beginPath();
    c.moveTo(0, 11);
    c.quadraticCurveTo(2, 14, 6, 12);
    c.stroke();
  }

  // 胡须
  c.strokeStyle = 'rgba(250,235,200,0.85)'; c.lineWidth = 0.9; c.lineCap = 'round';
  [[-5,5,-32,2],[-5,8,-30,8],[-5,11,-28,14],
   [ 5,5, 32,2],[ 5,8, 30,8],[ 5,11, 28,14]].forEach(([x1,y1,x2,y2])=>{
    c.beginPath(); c.moveTo(x1,y1); c.lineTo(x2,y2); c.stroke();
  });

  c.restore();
}

// 通用尾巴
function _drawTail(c, baseX, baseY, opts) {
  const o = opts || {};
  const wag = o.wag || 0;
  const curl = o.curl || 0; // 0=直立 1=弯卷
  c.save();
  c.strokeStyle = FUR1; c.lineWidth = 13; c.lineCap = 'round'; c.lineJoin = 'round';
  c.beginPath();
  c.moveTo(baseX, baseY);
  if(curl > 0.5) {
    // 卷起的尾巴
    c.bezierCurveTo(baseX+30, baseY-10+wag, baseX+45, baseY-30+wag, baseX+25, baseY-45+wag);
  } else {
    c.bezierCurveTo(baseX+30, baseY-2+wag, baseX+44, baseY-22+wag, baseX+30, baseY-46+wag);
  }
  c.stroke();
  // 白色尾巴尖
  c.strokeStyle = BELLY; c.lineWidth = 6;
  if(curl > 0.5) {
    c.beginPath();
    c.moveTo(baseX+32, baseY-32+wag); c.lineTo(baseX+25, baseY-45+wag); c.stroke();
  } else {
    c.beginPath();
    c.moveTo(baseX+38, baseY-32+wag); c.lineTo(baseX+30, baseY-46+wag); c.stroke();
  }
  c.restore();
}

// ─── Pose 1: 面包姿（蹲坐缩前爪） ─────────────────────────────────────────────
function _drawLoaf(c, cx, cy, t) {
  const breath = Math.sin(t*1.6)*1.5;

  // 尾巴卷在身边
  c.save();
  c.strokeStyle = FUR1; c.lineWidth = 12; c.lineCap = 'round';
  c.beginPath();
  c.moveTo(cx-22, cy-8+breath);
  c.bezierCurveTo(cx-44, cy+2+breath, cx-50, cy-18+breath, cx-30, cy-22+breath);
  c.stroke();
  c.restore();

  // 椭圆身体（团成一团）
  const bodyG = c.createRadialGradient(cx-6, cy-12+breath, 4, cx, cy-2+breath, 38);
  bodyG.addColorStop(0,'#dcb880');
  bodyG.addColorStop(0.7, FUR1);
  bodyG.addColorStop(1, FUR2);
  c.fillStyle = bodyG;
  c.beginPath();
  c.ellipse(cx, cy-6+breath, 36, 24, 0, 0, Math.PI*2);
  c.fill();

  // 身上的虎斑条纹
  c.fillStyle = STRIPE; c.globalAlpha = 0.42;
  [[-16,0.1],[-4,0.02],[8,-0.1],[20,-0.2]].forEach(([ox,rot])=>{
    c.beginPath(); c.ellipse(cx+ox, cy-6+breath, 3, 16, rot, 0, Math.PI*2); c.fill();
  });
  c.globalAlpha = 1;

  // 前爪藏起来（白色脚趾若隐若现）
  c.fillStyle = BELLY;
  c.beginPath();
  c.ellipse(cx-12, cy+12+breath, 8, 5, 0, 0, Math.PI*2);
  c.fill();
  c.beginPath();
  c.ellipse(cx+12, cy+12+breath, 8, 5, 0, 0, Math.PI*2);
  c.fill();

  // 头
  _drawCatHead(c, cx, cy-32+breath, { scale:1, t:t });
}

// ─── Pose 2: 端坐 ──────────────────────────────────────────────────────────
function _drawSit(c, cx, cy, t) {
  const breath = Math.sin(t*1.6)*1.2;
  // 尾巴卷在前
  _drawTail(c, cx-20, cy-2+breath, { wag: Math.sin(t*1.2)*4, curl: 1 });

  // 后腿蜷在屁股下
  c.fillStyle = FUR2;
  c.beginPath();
  c.ellipse(cx+15, cy+6+breath, 14, 10, 0, 0, Math.PI*2);
  c.fill();
  c.beginPath();
  c.ellipse(cx-15, cy+6+breath, 14, 10, 0, 0, Math.PI*2);
  c.fill();

  // 上半身（垂直坐立）
  const bodyG = c.createRadialGradient(cx-6, cy-30+breath, 4, cx, cy-12+breath, 36);
  bodyG.addColorStop(0,'#dcb880');
  bodyG.addColorStop(0.7, FUR1);
  bodyG.addColorStop(1, FUR2);
  c.fillStyle = bodyG;
  c.beginPath();
  c.ellipse(cx, cy-14+breath, 22, 30, 0, 0, Math.PI*2);
  c.fill();

  // 肚皮
  c.fillStyle = BELLY;
  c.beginPath(); c.ellipse(cx, cy-4+breath, 12, 20, 0, 0, Math.PI*2); c.fill();

  // 前腿（垂直）
  c.fillStyle = FUR1;
  _roundRect(c, cx-15, cy-8+breath, 11, 28, 5); c.fill();
  _roundRect(c, cx+4,  cy-8+breath, 11, 28, 5); c.fill();
  // 前爪
  c.fillStyle = BELLY;
  c.beginPath(); c.ellipse(cx-9, cy+22+breath, 7, 4, 0, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(cx+10, cy+22+breath, 7, 4, 0, 0, Math.PI*2); c.fill();

  // 头
  _drawCatHead(c, cx, cy-44+breath, { scale:1, t:t });
}

// ─── Pose 3: 侧卧 ─────────────────────────────────────────────────────────
function _drawLying(c, cx, cy, t) {
  const breath = Math.sin(t*1.4)*1.5;

  // 长长的身子横躺
  const bodyG = c.createRadialGradient(cx-10, cy-8+breath, 4, cx, cy+breath, 50);
  bodyG.addColorStop(0,'#dcb880');
  bodyG.addColorStop(0.7, FUR1);
  bodyG.addColorStop(1, FUR2);
  c.fillStyle = bodyG;
  c.beginPath();
  c.ellipse(cx-5, cy+breath, 50, 20, 0, 0, Math.PI*2);
  c.fill();

  // 肚皮（朝前）
  c.fillStyle = BELLY; c.globalAlpha = 0.85;
  c.beginPath();
  c.ellipse(cx-5, cy+8+breath, 42, 10, 0, 0, Math.PI*2);
  c.fill();
  c.globalAlpha = 1;

  // 条纹
  c.fillStyle = STRIPE; c.globalAlpha = 0.4;
  [-30,-15,5,20,30].forEach(ox => {
    c.beginPath(); c.ellipse(cx+ox, cy-2+breath, 2.5, 10, 0, 0, Math.PI*2); c.fill();
  });
  c.globalAlpha = 1;

  // 腿（前后两组小爪子）
  c.fillStyle = FUR2;
  c.beginPath(); c.ellipse(cx-30, cy+18+breath, 9, 6, 0, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(cx+25, cy+18+breath, 9, 6, 0, 0, Math.PI*2); c.fill();
  c.fillStyle = BELLY;
  c.beginPath(); c.ellipse(cx-30, cy+22+breath, 6, 3, 0, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(cx+25, cy+22+breath, 6, 3, 0, 0, Math.PI*2); c.fill();

  // 尾巴拖在后面
  c.strokeStyle = FUR1; c.lineWidth = 11; c.lineCap = 'round';
  c.beginPath();
  c.moveTo(cx+40, cy+breath);
  c.bezierCurveTo(cx+58, cy-4+breath, cx+62, cy+8+breath, cx+50, cy+12+breath);
  c.stroke();

  // 头放在前爪上
  _drawCatHead(c, cx-38, cy-6+breath, { scale:0.9, t:t, eyesClosed: 0.3 });
}

// ─── Pose 4: 舔爪 ──────────────────────────────────────────────────────────
function _drawGroom(c, cx, cy, t) {
  const wave = Math.sin(t*2.4);

  // 后腿坐姿
  c.fillStyle = FUR2;
  c.beginPath(); c.ellipse(cx+15, cy+6, 14, 10, 0, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(cx-15, cy+6, 14, 10, 0, 0, Math.PI*2); c.fill();

  // 尾巴
  _drawTail(c, cx-20, cy, { wag: wave*2, curl: 1 });

  // 身体
  const bodyG = c.createRadialGradient(cx-6, cy-30, 4, cx, cy-12, 36);
  bodyG.addColorStop(0,'#dcb880');
  bodyG.addColorStop(0.7, FUR1);
  bodyG.addColorStop(1, FUR2);
  c.fillStyle = bodyG;
  c.beginPath();
  c.ellipse(cx, cy-14, 22, 30, 0, 0, Math.PI*2);
  c.fill();
  c.fillStyle = BELLY;
  c.beginPath(); c.ellipse(cx, cy-4, 12, 20, 0, 0, Math.PI*2); c.fill();

  // 一只前爪举到嘴边（舔爪）
  c.fillStyle = FUR1;
  _roundRect(c, cx+4, cy-8, 11, 28, 5); c.fill();
  c.fillStyle = BELLY;
  c.beginPath(); c.ellipse(cx+10, cy+22, 7, 4, 0, 0, Math.PI*2); c.fill();

  // 抬起的爪子（朝头）
  c.fillStyle = FUR1;
  c.save();
  c.translate(cx-8, cy-30);
  c.rotate(-0.6);
  _roundRect(c, -6, 0, 10, 22, 5); c.fill();
  c.fillStyle = BELLY;
  c.beginPath(); c.ellipse(-2, 22, 6, 3.5, 0, 0, Math.PI*2); c.fill();
  c.restore();

  // 头微低 + 舌头吐出
  _drawCatHead(c, cx-2, cy-40, { scale:1, t:t, tilt:-0.15, eyesClosed:0.6 });

  // 粉色舌头（小三角）
  c.fillStyle = '#e0708a';
  c.save();
  c.translate(cx-2, cy-30);
  c.rotate(-0.15);
  c.beginPath();
  c.moveTo(-3, 4);
  c.quadraticCurveTo(0, 9 + wave*0.5, 3, 4);
  c.quadraticCurveTo(0, 7, -3, 4);
  c.fill();
  c.restore();
}

// ─── Pose 5: 伸懒腰 ───────────────────────────────────────────────────────
function _drawStretch(c, cx, cy, t) {
  const ext = Math.min(1, t * 2 % 4); // 慢慢伸展

  // 后高前低，背拱起
  c.fillStyle = FUR2;
  // 后腿（撑高）
  _roundRect(c, cx+12, cy-2, 12, 22, 6); c.fill();
  _roundRect(c, cx+26, cy-2, 12, 22, 6); c.fill();
  c.fillStyle = BELLY;
  c.beginPath(); c.ellipse(cx+18, cy+22, 6, 3.5, 0, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(cx+32, cy+22, 6, 3.5, 0, 0, Math.PI*2); c.fill();

  // 拱起的背
  c.beginPath();
  c.fillStyle = FUR1;
  c.moveTo(cx-30, cy);
  c.bezierCurveTo(cx-15, cy-30 - ext*5, cx+15, cy-30 - ext*5, cx+28, cy);
  c.bezierCurveTo(cx+22, cy+10, cx-22, cy+10, cx-30, cy);
  c.fill();

  // 条纹
  c.fillStyle = STRIPE; c.globalAlpha = 0.4;
  [[-20,-10,2.4,16,0.4],[-5,-22,2.4,16,0.1],[10,-22,2.4,16,-0.1],[22,-12,2.4,14,-0.4]].forEach(([ox,oy,rxx,ryy,rot])=>{
    c.beginPath(); c.ellipse(cx+ox, cy+oy, rxx, ryy, rot, 0, Math.PI*2); c.fill();
  });
  c.globalAlpha = 1;

  // 前腿伸直向前
  c.fillStyle = FUR1;
  _roundRect(c, cx-32, cy+2, 30, 9, 4); c.fill();
  _roundRect(c, cx-32, cy+12, 30, 9, 4); c.fill();
  c.fillStyle = BELLY;
  c.beginPath(); c.ellipse(cx-32, cy+6, 4, 4, 0, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(cx-32, cy+16, 4, 4, 0, 0, Math.PI*2); c.fill();
  // 张开的爪子
  c.fillStyle = '#d8987a';
  c.beginPath(); c.arc(cx-36, cy+5, 1.5, 0, Math.PI*2); c.fill();
  c.beginPath(); c.arc(cx-36, cy+8, 1.5, 0, Math.PI*2); c.fill();
  c.beginPath(); c.arc(cx-36, cy+15, 1.5, 0, Math.PI*2); c.fill();
  c.beginPath(); c.arc(cx-36, cy+18, 1.5, 0, Math.PI*2); c.fill();

  // 翘起的尾巴
  c.strokeStyle = FUR1; c.lineWidth = 11; c.lineCap = 'round';
  c.beginPath();
  c.moveTo(cx+30, cy);
  c.bezierCurveTo(cx+50, cy-8, cx+58, cy-30, cx+44, cy-44);
  c.stroke();
  c.strokeStyle = BELLY; c.lineWidth = 5;
  c.beginPath();
  c.moveTo(cx+50, cy-30); c.lineTo(cx+44, cy-44);
  c.stroke();

  // 头低下（爪子前面）
  _drawCatHead(c, cx-42, cy-2, { scale:0.9, t:t, eyesClosed:0.7, tilt:-0.5 });
}

// ─── Pose 6: 打哈欠 ───────────────────────────────────────────────────────
function _drawYawn(c, cx, cy, t) {
  const yawnPhase = (t % 2.5) / 2.5; // 哈欠周期
  const open = yawnPhase < 0.5 ? yawnPhase * 2 : (1 - yawnPhase) * 2;

  // 用端坐姿
  // 后腿
  c.fillStyle = FUR2;
  c.beginPath(); c.ellipse(cx+15, cy+6, 14, 10, 0, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(cx-15, cy+6, 14, 10, 0, 0, Math.PI*2); c.fill();

  _drawTail(c, cx-20, cy, { wag: 0, curl: 1 });

  // 身体
  const bodyG = c.createRadialGradient(cx-6, cy-30, 4, cx, cy-12, 36);
  bodyG.addColorStop(0,'#dcb880');
  bodyG.addColorStop(0.7, FUR1);
  bodyG.addColorStop(1, FUR2);
  c.fillStyle = bodyG;
  c.beginPath();
  c.ellipse(cx, cy-14, 22, 30, 0, 0, Math.PI*2);
  c.fill();
  c.fillStyle = BELLY;
  c.beginPath(); c.ellipse(cx, cy-4, 12, 20, 0, 0, Math.PI*2); c.fill();

  c.fillStyle = FUR1;
  _roundRect(c, cx-15, cy-8, 11, 28, 5); c.fill();
  _roundRect(c, cx+4,  cy-8, 11, 28, 5); c.fill();
  c.fillStyle = BELLY;
  c.beginPath(); c.ellipse(cx-9, cy+22, 7, 4, 0, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(cx+10, cy+22, 7, 4, 0, 0, Math.PI*2); c.fill();

  // 头：嘴大开 + 眯眼
  _drawCatHead(c, cx, cy-44, {
    scale: 1,
    t: t,
    mouthOpen: open,
    eyesClosed: open * 0.95,
    tilt: -0.05,
  });
}

// ─── Pose 7: 回头看 ───────────────────────────────────────────────────────
function _drawLookback(c, cx, cy, t) {
  // 用 loaf 姿，但头转过来看
  const breath = Math.sin(t*1.6)*1.5;
  const lookSide = Math.sin(t*0.6) > 0 ? 1 : -1;

  // 尾巴
  c.save();
  c.strokeStyle = FUR1; c.lineWidth = 12; c.lineCap = 'round';
  c.beginPath();
  c.moveTo(cx-22, cy-8+breath);
  c.bezierCurveTo(cx-44, cy+2+breath, cx-50, cy-18+breath, cx-30, cy-22+breath);
  c.stroke();
  c.restore();

  // 身体
  const bodyG = c.createRadialGradient(cx-6, cy-12+breath, 4, cx, cy-2+breath, 38);
  bodyG.addColorStop(0,'#dcb880');
  bodyG.addColorStop(0.7, FUR1);
  bodyG.addColorStop(1, FUR2);
  c.fillStyle = bodyG;
  c.beginPath();
  c.ellipse(cx, cy-6+breath, 36, 22, 0, 0, Math.PI*2);
  c.fill();

  // 条纹
  c.fillStyle = STRIPE; c.globalAlpha = 0.42;
  [-16,-4,8,20].forEach(ox => {
    c.beginPath(); c.ellipse(cx+ox, cy-6+breath, 3, 14, 0, 0, Math.PI*2); c.fill();
  });
  c.globalAlpha = 1;

  // 前爪
  c.fillStyle = BELLY;
  c.beginPath(); c.ellipse(cx-12, cy+12+breath, 8, 5, 0, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(cx+12, cy+12+breath, 8, 5, 0, 0, Math.PI*2); c.fill();

  // 头转过来（侧偏 + 眼神看侧边）
  _drawCatHead(c, cx + lookSide*6, cy-26+breath, {
    scale: 1,
    t: t,
    tilt: lookSide * 0.3,
    lookDir: lookSide,
    earTilt: 1, // 警觉
  });
}

// ─── Pose 8: 半睡眯眼 ─────────────────────────────────────────────────────
function _drawHalfsleep(c, cx, cy, t) {
  const breath = Math.sin(t*1.0)*2;

  // 尾巴贴在身边
  c.save();
  c.strokeStyle = FUR1; c.lineWidth = 11; c.lineCap = 'round';
  c.beginPath();
  c.moveTo(cx-30, cy+8+breath);
  c.bezierCurveTo(cx-52, cy+12+breath, cx-50, cy-12+breath, cx-30, cy-12+breath);
  c.stroke();
  c.restore();

  // 长长扁扁的身子（趴姿）
  const bodyG = c.createRadialGradient(cx-10, cy-8+breath, 4, cx, cy+breath, 50);
  bodyG.addColorStop(0,'#dcb880');
  bodyG.addColorStop(0.7, FUR1);
  bodyG.addColorStop(1, FUR2);
  c.fillStyle = bodyG;
  c.beginPath();
  c.ellipse(cx-2, cy+breath, 46, 16, 0, 0, Math.PI*2);
  c.fill();

  // 条纹
  c.fillStyle = STRIPE; c.globalAlpha = 0.42;
  [-26,-12,4,18,30].forEach(ox => {
    c.beginPath(); c.ellipse(cx+ox, cy-2+breath, 2.5, 10, 0, 0, Math.PI*2); c.fill();
  });
  c.globalAlpha = 1;

  // 前爪叠在前面
  c.fillStyle = BELLY;
  c.beginPath(); c.ellipse(cx-30, cy+10+breath, 10, 4, 0, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(cx-25, cy+14+breath, 10, 4, 0, 0, Math.PI*2); c.fill();

  // 头放在爪子上，眼皮重重
  _drawCatHead(c, cx-28, cy-6+breath, {
    scale: 0.92,
    t: t,
    eyesClosed: 0.75,
    earTilt: -0.3,
  });

  // 飘飘的Z
  const za = 0.4 + Math.sin(t*1.5)*0.25;
  c.font = 'bold 12px serif';
  c.fillStyle = `rgba(120,80,30,${za})`;
  c.fillText('z', cx+10, cy-30);
  c.font = 'bold 9px serif';
  c.fillStyle = `rgba(120,80,30,${za*0.6})`;
  c.fillText('z', cx+18, cy-40);
}

// ─── Pose 9: 准备扑姿 ─────────────────────────────────────────────────────
function _drawPounce(c, cx, cy, t) {
  const wag = Math.sin(t*8) * 14; // 屁股紧张地左右摆

  // 尾巴大幅摆动
  c.save();
  c.strokeStyle = FUR1; c.lineWidth = 11; c.lineCap = 'round';
  c.beginPath();
  c.moveTo(cx+22, cy);
  c.bezierCurveTo(cx+45 + wag, cy-4, cx+50 + wag, cy-22, cx+38 + wag, cy-38);
  c.stroke();
  c.restore();

  // 后腿（蜷起准备扑）
  c.fillStyle = FUR2;
  c.beginPath(); c.ellipse(cx+20, cy+8, 14, 12, 0, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(cx+8, cy+10, 14, 11, 0, 0, Math.PI*2); c.fill();

  // 身体（压低）
  const bodyG = c.createRadialGradient(cx-6, cy-8, 4, cx, cy-2, 38);
  bodyG.addColorStop(0,'#dcb880');
  bodyG.addColorStop(0.7, FUR1);
  bodyG.addColorStop(1, FUR2);
  c.fillStyle = bodyG;
  c.beginPath();
  c.ellipse(cx, cy-2, 32, 16, 0, 0, Math.PI*2);
  c.fill();

  // 条纹
  c.fillStyle = STRIPE; c.globalAlpha = 0.42;
  [-15,-3,9,18].forEach(ox => {
    c.beginPath(); c.ellipse(cx+ox, cy-2, 2.6, 10, 0, 0, Math.PI*2); c.fill();
  });
  c.globalAlpha = 1;

  // 前爪贴地
  c.fillStyle = FUR1;
  _roundRect(c, cx-22, cy+4, 28, 8, 4); c.fill();
  c.fillStyle = BELLY;
  c.beginPath(); c.ellipse(cx-22, cy+8, 4, 3, 0, 0, Math.PI*2); c.fill();

  // 头压低、瞳孔放大
  _drawCatHead(c, cx-24, cy-10, {
    scale: 0.95,
    t: t,
    earTilt: 1,
    tilt: -0.2,
  });
}

// ─── Pose 10: 蹲低偷瞄 ───────────────────────────────────────────────────
function _drawPeek(c, cx, cy, t) {
  const breath = Math.sin(t*1.8)*1;

  // 后腿压在身下
  c.fillStyle = FUR2;
  c.beginPath(); c.ellipse(cx+15, cy+8+breath, 13, 10, 0, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(cx-15, cy+8+breath, 13, 10, 0, 0, Math.PI*2); c.fill();

  // 尾巴
  _drawTail(c, cx-20, cy+breath, { wag: 0, curl: 1 });

  // 身体（短粗）
  const bodyG = c.createRadialGradient(cx-6, cy-15+breath, 4, cx, cy-2+breath, 32);
  bodyG.addColorStop(0,'#dcb880');
  bodyG.addColorStop(0.7, FUR1);
  bodyG.addColorStop(1, FUR2);
  c.fillStyle = bodyG;
  c.beginPath();
  c.ellipse(cx, cy-6+breath, 22, 22, 0, 0, Math.PI*2);
  c.fill();
  c.fillStyle = BELLY;
  c.beginPath(); c.ellipse(cx, cy+breath, 12, 14, 0, 0, Math.PI*2); c.fill();

  // 前腿微弯
  c.fillStyle = FUR1;
  _roundRect(c, cx-13, cy+2+breath, 11, 22, 5); c.fill();
  _roundRect(c, cx+2,  cy+2+breath, 11, 22, 5); c.fill();
  c.fillStyle = BELLY;
  c.beginPath(); c.ellipse(cx-7, cy+24+breath, 6, 4, 0, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(cx+8, cy+24+breath, 6, 4, 0, 0, Math.PI*2); c.fill();

  // 头压低，眼睛大睁，耳朵警觉
  _drawCatHead(c, cx, cy-22+breath, {
    scale: 0.95,
    t: t,
    earTilt: 1,
    tilt: -0.05,
  });
}

// ─── Pose 11: 翻肚皮 ─────────────────────────────────────────────────────
function _drawBelly(c, cx, cy, t) {
  const wiggle = Math.sin(t*1.2);

  // 整个身子翻过来，肚皮朝上
  // 后腿在右上方乱蹬
  c.fillStyle = FUR1;
  _roundRect(c, cx+18, cy-22, 9, 22, 4); c.fill();
  _roundRect(c, cx+30, cy-25 + wiggle*2, 9, 18, 4); c.fill();
  c.fillStyle = BELLY;
  c.beginPath(); c.ellipse(cx+22, cy-22, 5, 3, 0, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(cx+34, cy-26 + wiggle*2, 5, 3, 0, 0, Math.PI*2); c.fill();

  // 整个肚皮（白色大椭圆）
  c.fillStyle = BELLY;
  c.beginPath();
  c.ellipse(cx, cy-5, 36, 16, 0, 0, Math.PI*2);
  c.fill();

  // 上下毛色
  c.fillStyle = FUR1;
  c.beginPath();
  c.ellipse(cx-8, cy-12, 38, 8, -0.05, 0, Math.PI*2);
  c.fill();

  // 条纹（侧边露出来）
  c.fillStyle = STRIPE; c.globalAlpha = 0.4;
  [-22,-10,4,18].forEach(ox => {
    c.beginPath(); c.ellipse(cx+ox, cy-13, 3, 6, 0, 0, Math.PI*2); c.fill();
  });
  c.globalAlpha = 1;

  // 前爪举起来卖萌
  c.fillStyle = FUR1;
  _roundRect(c, cx-22, cy-22 + wiggle*1.5, 9, 18, 4); c.fill();
  _roundRect(c, cx-12, cy-26, 9, 20, 4); c.fill();
  c.fillStyle = BELLY;
  c.beginPath(); c.ellipse(cx-18, cy-22 + wiggle*1.5, 5, 3, 0, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(cx-8, cy-26, 5, 3, 0, 0, Math.PI*2); c.fill();

  // 尾巴向左甩
  c.strokeStyle = FUR1; c.lineWidth = 10; c.lineCap = 'round';
  c.beginPath();
  c.moveTo(cx+30, cy-2);
  c.bezierCurveTo(cx+50, cy-2 + wiggle*4, cx+58, cy+10, cx+50, cy+18);
  c.stroke();

  // 头朝下（像在仰头）
  _drawCatHead(c, cx-30, cy-2, {
    scale: 0.85,
    t: t,
    eyesClosed: 0.4,
    tilt: 2.7, // 倒过来
  });
}


function _roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x+r, y);
  c.lineTo(x+w-r, y); c.arcTo(x+w,y, x+w,y+r, r);
  c.lineTo(x+w, y+h-r); c.arcTo(x+w,y+h, x+w-r,y+h, r);
  c.lineTo(x+r, y+h); c.arcTo(x,y+h, x,y+h-r, r);
  c.lineTo(x, y+r); c.arcTo(x,y, x+r,y, r);
  c.closePath();
}

// ─── Cat AI ───────────────────────────────────────────────────────────────────
const BOUNDS = { minX: 110, maxX: 690, minY: 315, maxY: 468 };
let lastTs = 0, dayTimer = 90; // each "month" = 90 seconds

// 按权重随机选一个姿势
function pickRandomPose() {
  // belly 姿势只有信任 >= 75 才出现
  const pool = POSES.filter(p => p.id !== 'belly' || STATS.trust >= 75);
  // 不重复连续相同姿势
  const filtered = pool.filter(p => p.id !== CAT.pose);
  const pick = filtered.length ? filtered : pool;
  const total = pick.reduce((s,p) => s + p.weight, 0);
  let r = Math.random() * total;
  for(const p of pick) {
    if((r -= p.weight) <= 0) {
      CAT.pose = p.id;
      CAT.poseTimer = p.minDur + Math.random() * (p.maxDur - p.minDur);
      CAT.stateTimer = CAT.poseTimer;
      try { seenPoses.add(p.id); saveAchievements && saveAchievements(); } catch(e){}
      return;
    }
  }
}

function updateCat(dt) {
  if(gameOver) return;

  CAT.stateTimer -= dt;
  CAT.walkFrameTimer += dt;
  if(CAT.walkFrameTimer > 0.32) { CAT.walkFrameTimer = 0; CAT.walkFrame++; }

  if(CAT.state === 'idle' && CAT.stateTimer <= 0 && CAT.targetX === null) {
    const wb = catPersonality ? catPersonality.wanderBonus : 0;
    const wanderChance = (catMood === 'happy' ? 0.55 : catMood === 'bored' ? 0.2 : 0.45) + wb;
    if(Math.random() < wanderChance) {
      CAT.targetX = BOUNDS.minX + Math.random() * (BOUNDS.maxX - BOUNDS.minX);
      CAT.targetY = BOUNDS.minY + Math.random() * (BOUNDS.maxY - BOUNDS.minY);
      CAT.state = 'walk';
    } else {
      // 不漫步就切换姿势
      pickRandomPose();
    }
  }
  // 姿势计时
  if(CAT.state === 'idle') {
    CAT.poseTimer = (CAT.poseTimer || 0) - dt;
    if(CAT.poseTimer <= 0) {
      pickRandomPose();
    }
  }

  if(CAT.targetX !== null) {
    const dx = CAT.targetX - CAT.x, dy = CAT.targetY - CAT.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    CAT.facingLeft = dx < 0;
    if(dist < 5) {
      CAT.x = CAT.targetX; CAT.y = CAT.targetY;
      CAT.targetX = null; CAT.targetY = null;
      if(CAT.state === 'walk') { CAT.state = 'idle'; pickRandomPose(); }
    } else {
      const spd = 95 * dt;
      CAT.x += (dx/dist) * spd;
      CAT.y += (dy/dist) * spd;
    }
  }

  CAT.x = Math.max(80, Math.min(720, CAT.x));
  CAT.y = Math.max(300, Math.min(490, CAT.y));
}

// ─── Game updates ─────────────────────────────────────────────────────────────
function updateCooldowns(dt) {
  ['feed','play','pet','sleep','water','scratch'].forEach(k => {
    COOLDOWNS[k] = Math.max(0, COOLDOWNS[k] - dt);
    const btn = document.getElementById('btn-' + k);
    const cd  = document.getElementById('cd-' + k);
    if(COOLDOWNS[k] > 0) {
      btn.disabled = true;
      cd.textContent = Math.ceil(COOLDOWNS[k]) + 's';
    } else {
      btn.disabled = false;
      cd.textContent = '';
    }
  });
  // unlock button cooldowns
  unlockedIds.forEach(id => {
    const u = UNLOCKS.find(u => u.id === id);
    if(!u) return;
    COOLDOWNS[u.cdKey] = Math.max(0, (COOLDOWNS[u.cdKey] || 0) - dt);
    const btn = document.getElementById('btn-' + id);
    const cdEl = document.getElementById('cd-' + id);
    if(!btn) return;
    if(COOLDOWNS[u.cdKey] > 0) {
      btn.disabled = true;
      if(cdEl) cdEl.textContent = Math.ceil(COOLDOWNS[u.cdKey]) + 's';
    } else {
      btn.disabled = false;
      if(cdEl) cdEl.textContent = '';
    }
  });
}

function updateDay(dt) {
  if(gameOver) return;
  dayTimer -= dt;
  if(dayTimer <= 0) { dayTimer = 90; advanceDay(); }
}

function advanceDay() {
  // Compute mood
  if(STATS.hunger < 25 || STATS.health < 30) {
    catMood = 'anxious';
  } else if(actionsToday === 0) {
    catMood = 'bored';
  } else if(STATS.trust >= 60 && STATS.hunger >= 50 && STATS.health >= 60) {
    catMood = 'happy';
  } else {
    catMood = 'neutral';
  }
  actionsToday = 0;
  updateMoodChip();
  checkUnlocks();

  // 第12个月结束后直接触发结局，不再推进到第13个月
  if(month >= 12) { triggerEnding(); return; }

  month++;
  STATS.hunger  = Math.max(0, STATS.hunger - 16);
  STATS.health  = Math.max(0, STATS.health - (STATS.hunger < 20 ? 12 : 2));
  STATS.trust   = Math.max(0, STATS.trust  - (STATS.hunger < 10 ? 5  : 0));
  clampStats(); updateHUD();

  document.getElementById('day-chip').textContent = `第 ${month} 月`;
  document.getElementById('growth-chip').textContent = getGrowthLabel();
  updateCatScale();
  updateStateChip();

  // Hunger warning
  if(STATS.hunger < 20 && !shownTips.has('hunger_low')) {
    shownTips.add('hunger_low');
    later(400, () => showToast('⚠️', ACTION_TIPS.hunger_low.text));
  }

  // Monthly story toast
  const story = STORY.find(s => s.month === month);
  if(story) {
    const delay = STATS.hunger < 20 ? 3500 : 400;
    later(delay, () => showToast(story.icon, story.text));
  }

  // Random event (40%)
  if(!eventLock && Math.random() < 0.4) {
    const phase = getPhase();
    const pool = EVENTS.filter(e => e.phases.includes(phase));
    if(pool.length) {
      const ev = pool[Math.floor(Math.random() * pool.length)];
      later(story ? 4500 : 1500, () => triggerEvent(ev));
    }
  }
}

function triggerEvent(ev) {
  if(eventLock) return;
  eventLock = true;
  CAT.reactEmoji = ev.catReact || '';
  CAT.glowColor  = ev.catGlow  || null;
  if(!ev.choices) ev.effect();
  clampStats(); updateHUD(); updateStateChip(); checkUnlocks();
  later(600, () => {
    if(ev.choices) {
      showChoicePopup(ev);
    } else {
      showPopup(ev.emoji, ev.title, ev.desc, ev.tip);
    }
    eventLock = false;
  });
}

// small non-blocking toast (bottom of screen, auto-dismiss)
function showToast(icon, text) {
  const el = document.createElement('div');
  el.style.cssText = `
    position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
    background:rgba(255,249,235,0.97); border:1px solid rgba(180,130,70,0.35);
    border-radius:16px; padding:10px 20px; max-width:480px; width:90%;
    color:#6b4226; font-size:13px; line-height:1.7;
    box-shadow:0 6px 24px rgba(100,50,10,0.18);
    font-family:'Microsoft YaHei','微软雅黑',serif;
    z-index:50; text-align:center;
    animation:toastIn 0.3s cubic-bezier(.34,1.56,.64,1);
  `;
  el.innerHTML = `${icon} ${text}`;
  document.body.appendChild(el);
  later(3800, () => {
    el.style.transition='opacity 0.4s';
    el.style.opacity='0';
    later(400, () => el.remove());
  });
}

// inject toast animation
const toastStyle = document.createElement('style');
toastStyle.textContent = `@keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(12px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }`;
document.head.appendChild(toastStyle);

function clampStats() {
  for(const k in STATS) STATS[k] = Math.max(0, Math.min(100, STATS[k]));
}

function updateHUD() {
  document.getElementById('bar-trust').style.width  = STATS.trust  + '%';
  document.getElementById('bar-health').style.width = STATS.health + '%';
  document.getElementById('bar-hunger').style.width = STATS.hunger + '%';

  // bond chip 跳动
  const bondEl = document.getElementById('bond-chip');
  const pctEl  = document.getElementById('bond-pct');
  const newPct = Math.round(STATS.trust);
  const oldPct = parseInt(pctEl.textContent) || 0;
  if(newPct !== oldPct) {
    pctEl.textContent = newPct + '%';
    bondEl.classList.remove('bump');
    void bondEl.offsetWidth;
    bondEl.classList.add('bump');
    const delta = newPct - oldPct;
    if(Math.abs(delta) >= 1) {
      const d = document.createElement('div');
      d.className = 'bond-delta';
      d.textContent = (delta > 0 ? '+' : '') + delta;
      d.style.color = delta > 0 ? '#d4516a' : '#7a7a8a';
      bondEl.appendChild(d);
      setTimeout(() => d.remove(), 1300);
    }
    if(newPct >= 80) bondEl.style.color = '#d4516a';
    else if(newPct >= 50) bondEl.style.color = '#c47830';
    else bondEl.style.color = '#a07050';
  }
  // 检查成就
  try { checkAchievements(); } catch(e){}
}

function updateStateChip() {
  const t = STATS.trust;
  const phase = getPhase();
  const phaseLabel = phase==='stranger'?'陌生期（1-4月）' : phase==='curious'?'试探期（5-8月）' : '亲密期（9-12月）';
  const trustLabel = t>=85?'😻 挚友' : t>=60?'😺 熟悉' : t>=35?'🙂 接受' : '😿 陌生';
  document.getElementById('state-chip').textContent = `${trustLabel} · ${phaseLabel}`;
}

function updateMoodChip() {
  const el = document.getElementById('mood-chip');
  const labels = { happy:'😻 开心', neutral:'😐 平静', bored:'😒 无聊', anxious:'😟 焦虑' };
  el.textContent = labels[catMood] || '😐 平静';
  el.className = 'mood-' + catMood;
  el.id = 'mood-chip';
}

function checkUnlocks() {
  UNLOCKS.forEach(u => {
    if(!unlockedIds.has(u.id) && u.condition()) {
      unlockedIds.add(u.id);
      addUnlockButton(u);
      sfx('unlock');
      later(200, () => showToast('🔓', `新互动解锁：${u.label}`));
    }
  });
}

function addUnlockButton(u) {
  COOLDOWNS[u.cdKey] = COOLDOWNS[u.cdKey] || 0;
  const btn = document.createElement('button');
  btn.className = 'btn btn-unlock';
  btn.id = 'btn-' + u.id;
  btn.innerHTML = `${u.label} <span class="btn-cd" id="cd-${u.id}"></span>`;
  btn.onclick = () => {
    if(COOLDOWNS[u.cdKey] > 0 || gameOver) return;
    COOLDOWNS[u.cdKey] = u.cd;
    actionsToday++;
    u.effect();
    if(!shownTips.has('unlock_' + u.id)) {
      shownTips.add('unlock_' + u.id);
      later(400, () => showToast(u.toast.icon, u.toast.text));
    }
  };
  document.getElementById('actions').appendChild(btn);
}

// ─── Actions ──────────────────────────────────────────────────────────────────
function action(type) {
  if(COOLDOWNS[type] > 0 || gameOver) return;
  COOLDOWNS[type] = CD_TIMES[type];
  actionsToday++;
  tryFulfillWish(type);

  const P = catPersonality || { trustMult:1, playMult:1, sleepMult:1, feedMult:1 };

  if(type === 'feed') {
    sfx('feed');
    CAT.targetX = BOWL.x; CAT.targetY = BOWL.y - 15; CAT.state = 'walk';
    later(1800, () => { CAT.state='eat'; CAT.stateTimer=4; CAT.reactEmoji='😋'; CAT.glowColor='#e89040'; });
    later(5800, () => {
      STATS.hunger = Math.min(100, STATS.hunger + Math.round(25 * P.feedMult));
      STATS.health = Math.min(100, STATS.health + 5);
      STATS.trust  = Math.min(100, STATS.trust  + Math.round(4 * P.trustMult));
      endAnim(); spawnParticles('🐟',3); clampStats(); updateHUD(); updateStateChip(); checkUnlocks();
      if(!shownTips.has('feed_first')) {
        shownTips.add('feed_first');
        later(300, () => showToast(ACTION_TIPS.feed_first.icon, ACTION_TIPS.feed_first.text));
      }
    });
  } else if(type === 'play') {
    sfx('play');
    startPlayMinigame();
    // 玩耍奖励在 endPlayMinigame 里给
  } else if(type === 'water') {
    sfx('feed');
    CAT.targetX = WATER.x; CAT.targetY = WATER.y - 12; CAT.state = 'walk';
    later(1800, () => { CAT.state='eat'; CAT.stateTimer=3; CAT.reactEmoji='💧'; CAT.glowColor='#80b8d0'; });
    later(5500, () => {
      STATS.health = Math.min(100, STATS.health + 8);
      STATS.trust  = Math.min(100, STATS.trust  + Math.round(3 * P.trustMult));
      endAnim(); spawnParticles('💧',3); clampStats(); updateHUD(); updateStateChip(); checkUnlocks();
      if(!shownTips.has('water_first')) {
        shownTips.add('water_first');
        later(300, () => showToast('💧', '猫咪的水盘要每天换新水！流动的水更受它们喜爱。'));
      }
    });
  } else if(type === 'scratch') {
    sfx('play');
    CAT.targetX = SCRATCH.x - 30; CAT.targetY = SCRATCH.y + 50; CAT.state = 'walk';
    later(1500, () => { CAT.state='play'; CAT.stateTimer=4; CAT.reactEmoji='🪵'; CAT.glowColor='#c8a060'; });
    later(6000, () => {
      STATS.trust  = Math.min(100, STATS.trust  + Math.round(5 * P.trustMult));
      STATS.health = Math.min(100, STATS.health + 4);
      endAnim(); spawnParticles('✨',3); clampStats(); updateHUD(); updateStateChip(); checkUnlocks();
      if(!shownTips.has('scratch_first')) {
        shownTips.add('scratch_first');
        later(300, () => showToast('🪵', '磨爪是猫的本能。有了猫抓板，沙发就有救了！'));
      }
    });
  } else if(type === 'pet') {
    if(STATS.trust < 30) {
      sfx('meow');
      CAT.reactEmoji = '😾'; CAT.glowColor = '#a07050';
      spawnParticles('😾',1);
      later(2000, () => { CAT.reactEmoji=''; CAT.glowColor=null; });
      if(!shownTips.has('pet_refused')) {
        shownTips.add('pet_refused');
        later(500, () => showToast(ACTION_TIPS.pet_refused.icon, ACTION_TIPS.pet_refused.text));
      }
      return;
    }
    CAT.targetX = 400; CAT.targetY = 368; CAT.state = 'walk';
    later(1500, () => { sfx('pet'); CAT.state='react'; CAT.stateTimer=3; CAT.reactEmoji='💕'; CAT.glowColor='#e87080'; });
    later(4500, () => {
      STATS.trust = Math.min(100, STATS.trust + Math.round(6 * P.trustMult));
      endAnim(); spawnParticles('💕',5); clampStats(); updateHUD(); updateStateChip(); checkUnlocks();
      if(!shownTips.has('pet_first')) {
        shownTips.add('pet_first');
        later(300, () => showToast(ACTION_TIPS.pet_first.icon, ACTION_TIPS.pet_first.text));
      }
    });
  } else if(type === 'sleep') {
    sfx('sleep');
    CAT.targetX = BED.x; CAT.targetY = BED.y - 12; CAT.state = 'walk';
    later(1500, () => { CAT.state='sleep'; CAT.stateTimer=12; CAT.reactEmoji='💤'; CAT.glowColor='#80b8d0'; });
    later(13500, () => {
      STATS.health = Math.min(100, STATS.health + Math.round(20 * P.sleepMult));
      STATS.trust  = Math.min(100, STATS.trust  + 2);
      endAnim(); spawnParticles('⭐',3);
      dayTimer = Math.max(0, dayTimer - 20);
      clampStats(); updateHUD(); updateStateChip(); checkUnlocks();
      if(!shownTips.has('sleep_first')) {
        shownTips.add('sleep_first');
        later(300, () => showToast(ACTION_TIPS.sleep_first.icon, ACTION_TIPS.sleep_first.text));
      }
    });
  }
}

function later(ms, fn) { setTimeout(fn, ms); }
function endAnim() { CAT.state='idle'; pickRandomPose(); CAT.reactEmoji=''; CAT.glowColor=null; }

// ─── Particles ────────────────────────────────────────────────────────────────
function spawnParticles(emoji, n) {
  const wrap = document.getElementById('game-wrap');
  const rect = wrap.getBoundingClientRect();
  const scaleX = rect.width  / 800;
  const scaleY = rect.height / 560;
  const scale  = Math.min(scaleX, scaleY);
  for(let i = 0; i < n; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    el.textContent = emoji;
    el.style.left = (rect.left + CAT.x * scale + (Math.random()-0.5)*50) + 'px';
    el.style.top  = (rect.top  + CAT.y * scale - 60 + (Math.random()-0.5)*30) + 'px';
    el.style.animationDelay = (i * 0.18) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1800);
  }
}

// ─── Popup ────────────────────────────────────────────────────────────────────
function showPopup(icon, title, body, tip) {
  document.getElementById('popup-icon').textContent  = icon;
  document.getElementById('popup-title').textContent = title;
  document.getElementById('popup-body').textContent  = body;
  const tipEl = document.getElementById('popup-tip');
  if(tip) { tipEl.textContent = tip; tipEl.style.display = 'block'; }
  else     { tipEl.style.display = 'none'; }
  // hide choice UI
  const choicesEl = document.getElementById('popup-choices');
  choicesEl.style.display = 'none';
  choicesEl.innerHTML = '';
  document.getElementById('popup-result').style.display = 'none';
  document.getElementById('popup-btn').style.display = 'block';
  document.getElementById('popup').classList.add('show');
}

function showChoicePopup(ev) {
  document.getElementById('popup-icon').textContent  = ev.emoji;
  document.getElementById('popup-title').textContent = ev.title;
  document.getElementById('popup-body').textContent  = ev.desc;
  const tipEl = document.getElementById('popup-tip');
  if(ev.tip) { tipEl.textContent = ev.tip; tipEl.style.display = 'block'; }
  else        { tipEl.style.display = 'none'; }
  document.getElementById('popup-result').style.display = 'none';
  document.getElementById('popup-btn').style.display = 'none';

  const choicesEl = document.getElementById('popup-choices');
  choicesEl.style.display = 'flex';
  choicesEl.innerHTML = '';
  ev.choices.forEach((ch, idx) => {
    const btn = document.createElement('button');
    btn.className = 'btn choice-btn';
    btn.textContent = ch.label;
    btn.onclick = () => makeChoice(ev, idx);
    choicesEl.appendChild(btn);
  });
  document.getElementById('popup').classList.add('show');
}

function makeChoice(ev, idx) {
  const ch = ev.choices[idx];
  // apply effect with personality multiplier where relevant
  ch.effect();
  clampStats(); updateHUD(); updateStateChip(); checkUnlocks();

  // cat react
  if(ch.catReact) { CAT.reactEmoji = ch.catReact; CAT.glowColor = ch.catGlow || null; }

  // show result text, hide choice buttons, show confirm btn
  const choicesEl = document.getElementById('popup-choices');
  Array.from(choicesEl.children).forEach((b, i) => {
    b.disabled = true;
    if(i === idx) b.classList.add('chosen');
  });
  const resultEl = document.getElementById('popup-result');
  resultEl.textContent = ch.result;
  resultEl.style.display = 'block';
  document.getElementById('popup-btn').style.display = 'block';
}

function closePopup() {
  document.getElementById('popup').classList.remove('show');
  CAT.reactEmoji = '';
  CAT.glowColor  = null;

  // First close = assign personality
  if(!catPersonality && !personalityIntroShown) {
    personalityIntroShown = true;
    const keys = Object.keys(PERSONALITIES);
    const key  = keys[Math.floor(Math.random() * keys.length)];
    catPersonality = PERSONALITIES[key];
    document.getElementById('personality-chip').textContent = catPersonality.name;
    later(300, () => showToast('✨', `${catPersonality.name} — ${catPersonality.desc}`));
    try { personalitiesMet.add(key); saveAchievements(); checkAchievements(); } catch(e){}
  }
}

// ─── Render loop ──────────────────────────────────────────────────────────────
function loop(ts) {
  if(lastTs === 0) lastTs = ts;
  const dt = Math.min((ts - lastTs) / 1000, 0.1);
  lastTs = ts;

  updateCat(dt);
  updateCooldowns(dt);
  updateDay(dt);
  updateWish(dt);

  ctx.clearRect(0, 0, W, H);
  drawCat(ctx, CAT, STATS.trust);

  requestAnimationFrame(loop);
}

// ─── Canvas click ─────────────────────────────────────────────────────────────
canvas.addEventListener('click', e => {
  if(gameOver) return;
  const r = canvas.getBoundingClientRect();
  const scaleX = r.width  / 800;
  const scaleY = r.height / 560;
  const mx = (e.clientX - r.left) / scaleX;
  const my = (e.clientY - r.top)  / scaleY;
  const dx = mx - CAT.x, dy = my - CAT.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if(dist < 65) {
    sfx('meow');
    // 短暂的反应表情
    if(!CAT.reactEmoji) {
      CAT.reactEmoji = STATS.trust >= 50 ? '💕' : STATS.trust >= 25 ? '😺' : '😾';
      later(1200, () => { if(CAT.state === 'idle' || CAT.state === 'walk') CAT.reactEmoji = ''; });
    }
    // 信任足够的话同时触发抚摸
    if(COOLDOWNS.pet <= 0 && STATS.trust >= 30) action('pet');
  }
});

// ─── Random ambient meows ─────────────────────────────────────────────────────
function scheduleAmbientMeow() {
  // 30~70 秒间隔随机一次猫叫，信任越高越爱叫
  const trustFactor = Math.max(0.5, Math.min(1.5, 1 + (STATS.trust - 50) / 100));
  const minMs = 30000 / trustFactor;
  const maxMs = 70000 / trustFactor;
  const next  = minMs + Math.random() * (maxMs - minMs);
  setTimeout(() => {
    if(!gameOver && CAT.state !== 'sleep') {
      sfx('meow');
      if(!CAT.reactEmoji) {
        const moodEmoji = catMood === 'happy' ? '😻' : catMood === 'anxious' ? '😿' : catMood === 'bored' ? '😾' : '😺';
        CAT.reactEmoji = moodEmoji;
        later(1500, () => { if(CAT.state === 'idle' || CAT.state === 'walk') CAT.reactEmoji = ''; });
      }
    }
    scheduleAmbientMeow();
  }, next);
}
scheduleAmbientMeow();

const SAVE_KEY = 'catgame_save_v1';

function saveGame() {
  const data = {
    STATS: { ...STATS },
    month, catMood, actionsToday, dayTimer, catName,
    catPersonality: catPersonality ? Object.keys(PERSONALITIES).find(k => PERSONALITIES[k] === catPersonality) : null,
    personalityIntroShown,
    unlockedIds: [...unlockedIds],
    shownTips: [...shownTips],
    gameOver,
    wishCooldown,
  };
  localStorage.setItem(SAVE_KEY, JSON.stringify(data));
}

function loadGame() {
  const raw = localStorage.getItem(SAVE_KEY);
  if(!raw) return false;
  try {
    const d = JSON.parse(raw);
    // 已结束的存档不再加载，避免卡在结局之后
    if(d.month > 12 || d.gameOver) {
      localStorage.removeItem(SAVE_KEY);
      return false;
    }
    Object.assign(STATS, d.STATS);
    month = d.month;
    catMood = d.catMood;
    actionsToday = d.actionsToday;
    dayTimer = d.dayTimer;
    catName = d.catName || '小猫';
    personalityIntroShown = d.personalityIntroShown;
    gameOver = d.gameOver;
    wishCooldown = d.wishCooldown != null ? d.wishCooldown : 35;
    activeWish = null;
    hideWishBubble();
    if(d.catPersonality) catPersonality = PERSONALITIES[d.catPersonality];
    d.unlockedIds.forEach(id => {
      unlockedIds.add(id);
      const u = UNLOCKS.find(u => u.id === id);
      if(u) addUnlockButton(u);
    });
    d.shownTips.forEach(t => shownTips.add(t));
    // sync UI
    updateHUD();
    updateStateChip();
    updateMoodChip();
    updateCatScale();
    document.getElementById('day-chip').textContent = `第 ${month} 月`;
    document.getElementById('growth-chip').textContent = getGrowthLabel();
    if(catPersonality) document.getElementById('personality-chip').textContent = catPersonality.name;
    if(catName) {
      document.getElementById('name-chip').textContent = '🏷️ ' + catName;
      document.getElementById('name-chip').style.display = 'block';
    }
    return true;
  } catch(e) {
    return false;
  }
}

// ─── Play Minigame (feather wand) ─────────────────────────────────────────────
let playState = {
  active: false,
  feather: { x: 400, y: 300 },
  prevFeather: { x: 400, y: 300 },
  catchCount: 0,
  totalDistance: 0,
  timeLeft: 10,
  startedAt: 0,
  lastCatchAt: 0,
  trails: [],
  rafId: null,
};
const PLAY_DURATION = 10;

function startPlayMinigame() {
  if(gameOver) return;
  // 重置状态
  playState.active = true;
  playState.catchCount = 0;
  playState.totalDistance = 0;
  playState.timeLeft = PLAY_DURATION;
  playState.startedAt = performance.now();
  playState.lastCatchAt = 0;
  playState.feather.x = 400;
  playState.feather.y = 300;
  playState.prevFeather.x = 400;
  playState.prevFeather.y = 300;
  playState.trails = [];

  document.getElementById('play-time').textContent = PLAY_DURATION;
  document.getElementById('play-score').textContent = '0';
  document.getElementById('play-overlay').classList.add('active');

  // 猫咪进入"追逐模式"
  CAT.state = 'play';
  CAT.stateTimer = 999;
  CAT.targetX = null;
  CAT.targetY = null;
  CAT.reactEmoji = '⚡';
  CAT.glowColor = '#d4904a';

  // 鼠标/触摸事件
  const overlay = document.getElementById('play-overlay');
  overlay.addEventListener('mousemove', onPlayMouse);
  overlay.addEventListener('touchmove', onPlayTouch, { passive: false });
  overlay.addEventListener('touchstart', onPlayTouch, { passive: false });

  // 启动循环
  playState.rafId = requestAnimationFrame(playMinigameLoop);
}

function onPlayMouse(e) {
  const rect = canvas.getBoundingClientRect();
  const sx = rect.width / 800;
  const sy = rect.height / 560;
  playState.feather.x = (e.clientX - rect.left) / sx;
  playState.feather.y = (e.clientY - rect.top) / sy;
}
function onPlayTouch(e) {
  e.preventDefault();
  if(!e.touches[0]) return;
  const rect = canvas.getBoundingClientRect();
  const sx = rect.width / 800;
  const sy = rect.height / 560;
  playState.feather.x = (e.touches[0].clientX - rect.left) / sx;
  playState.feather.y = (e.touches[0].clientY - rect.top) / sy;
}

function playMinigameLoop(ts) {
  if(!playState.active) return;
  const elapsed = (ts - playState.startedAt) / 1000;
  playState.timeLeft = Math.max(0, PLAY_DURATION - elapsed);
  document.getElementById('play-time').textContent = playState.timeLeft.toFixed(1);

  // 计算羽毛速度
  const dx = playState.feather.x - playState.prevFeather.x;
  const dy = playState.feather.y - playState.prevFeather.y;
  const moveDist = Math.sqrt(dx*dx + dy*dy);
  playState.totalDistance += moveDist;
  playState.prevFeather.x = playState.feather.x;
  playState.prevFeather.y = playState.feather.y;

  // 拖尾粒子
  if(moveDist > 4) {
    playState.trails.push({
      x: playState.feather.x,
      y: playState.feather.y,
      life: 1,
    });
    if(playState.trails.length > 20) playState.trails.shift();
  }
  playState.trails.forEach(t => t.life -= 0.04);
  playState.trails = playState.trails.filter(t => t.life > 0);

  // 猫咪追逐羽毛
  const catDx = playState.feather.x - CAT.x;
  const catDy = playState.feather.y - CAT.y;
  const catDist = Math.sqrt(catDx*catDx + catDy*catDy);

  CAT.facingLeft = catDx < 0;

  // 猫咪保持一定距离追，速度根据距离变化
  const targetDist = 50;
  if(catDist > targetDist) {
    const spd = Math.min(220, 110 + catDist * 0.6) / 60; // 越远越快
    CAT.x += (catDx / catDist) * spd;
    CAT.y += (catDy / catDist) * spd;
  }

  // 限制猫咪在界内
  CAT.x = Math.max(80, Math.min(720, CAT.x));
  CAT.y = Math.max(300, Math.min(490, CAT.y));

  // 抓取检测：羽毛慢且接近时算一次抓取
  if(catDist < 60 && moveDist < 3 && ts - playState.lastCatchAt > 800) {
    playState.catchCount++;
    playState.lastCatchAt = ts;
    document.getElementById('play-score').textContent = playState.catchCount;
    // 抓取动效
    spawnParticles('✨', 2);
    sfx('unlock');
    CAT.reactEmoji = '😻';
    later(500, () => { if(playState.active) CAT.reactEmoji = '⚡'; });
  }

  // 时间到结束
  if(playState.timeLeft <= 0) {
    endPlayMinigame();
    return;
  }

  // 在 game canvas 上画羽毛和拖尾
  drawFeather();

  playState.rafId = requestAnimationFrame(playMinigameLoop);
}

function drawFeather() {
  const ctx2 = ctx;
  // 拖尾
  playState.trails.forEach(t => {
    ctx2.save();
    ctx2.globalAlpha = t.life * 0.5;
    ctx2.fillStyle = '#ff9050';
    ctx2.beginPath();
    ctx2.arc(t.x, t.y, 6 * t.life + 2, 0, Math.PI*2);
    ctx2.fill();
    ctx2.restore();
  });

  // 羽毛主体
  const fx = playState.feather.x;
  const fy = playState.feather.y;
  const t = Date.now() / 1000;
  const wave = Math.sin(t * 6) * 4;

  ctx2.save();
  ctx2.translate(fx, fy);
  ctx2.rotate(wave * 0.05);

  // 羽毛轴
  ctx2.strokeStyle = '#5a3018'; ctx2.lineWidth = 2; ctx2.lineCap = 'round';
  ctx2.beginPath(); ctx2.moveTo(0, 0); ctx2.lineTo(0, -36); ctx2.stroke();

  // 羽毛羽片
  for(let i = 0; i < 5; i++) {
    const y = -8 - i * 6;
    const w = 4 + i * 2.5;
    const col = ['#e87090','#f0a060','#f5c860','#80c0d0','#a080c8'][i];
    ctx2.fillStyle = col;
    ctx2.beginPath();
    ctx2.ellipse(-w/2, y, w, 5, -0.4, 0, Math.PI*2);
    ctx2.fill();
    ctx2.beginPath();
    ctx2.ellipse(w/2, y, w, 5, 0.4, 0, Math.PI*2);
    ctx2.fill();
  }
  // 顶端绒球
  ctx2.fillStyle = '#ff90b0';
  ctx2.beginPath(); ctx2.arc(0, -38, 4, 0, Math.PI*2); ctx2.fill();
  ctx2.fillStyle = '#fff';
  ctx2.beginPath(); ctx2.arc(-1, -39, 1.5, 0, Math.PI*2); ctx2.fill();
  ctx2.restore();

  // 鼠标光圈
  ctx2.save();
  ctx2.strokeStyle = 'rgba(255,200,100,0.5)';
  ctx2.lineWidth = 2;
  ctx2.beginPath(); ctx2.arc(fx, fy, 8 + Math.sin(t*8)*2, 0, Math.PI*2); ctx2.stroke();
  ctx2.restore();
}

function endPlayMinigame() {
  playState.active = false;
  if(playState.rafId) cancelAnimationFrame(playState.rafId);
  document.getElementById('play-overlay').classList.remove('active');

  const overlay = document.getElementById('play-overlay');
  overlay.removeEventListener('mousemove', onPlayMouse);
  overlay.removeEventListener('touchmove', onPlayTouch);
  overlay.removeEventListener('touchstart', onPlayTouch);

  // 计算评分（0~5星）
  // 抓取数：理想 4-6 次。距离：理想 > 3000px
  const catchScore = Math.min(3, playState.catchCount * 0.6);
  const moveScore = Math.min(2, playState.totalDistance / 2000);
  const stars = Math.max(1, Math.min(5, Math.round(catchScore + moveScore)));

  // 根据星数发奖励
  const P = catPersonality || { trustMult:1, playMult:1 };
  const baseTrust = [0, 4, 7, 10, 13, 17][stars];
  const baseHealth = [0, 1, 2, 3, 4, 5][stars];

  STATS.trust  = Math.min(100, STATS.trust  + Math.round(baseTrust * P.playMult * P.trustMult));
  STATS.health = Math.min(100, STATS.health + baseHealth);
  STATS.hunger = Math.max(0,   STATS.hunger - 5);

  endAnim();
  spawnParticles('🧶', 3);
  clampStats(); updateHUD(); updateStateChip(); checkUnlocks();
  tryFulfillWish('play');

  // 评分toast
  const starStr = '⭐'.repeat(stars) + '☆'.repeat(5 - stars);
  const ratingMsg = [
    '', '它有点意兴阑珊', '玩了一会儿', '玩得不错！', '玩得很尽兴！', '玩疯了！太开心了！'
  ][stars];
  showToast(starStr, `${ratingMsg} · 抓 ${playState.catchCount} 次 · +${Math.round(baseTrust * P.playMult * P.trustMult)} 亲密度`);

  if(!shownTips.has('play_first')) {
    shownTips.add('play_first');
    later(800, () => showToast(ACTION_TIPS.play_first.icon, ACTION_TIPS.play_first.text));
  }
}


const PHOTO_KEY = 'catgame_photos_v1';
let photos = [];

function loadPhotos() {
  try { photos = JSON.parse(localStorage.getItem(PHOTO_KEY) || '[]'); }
  catch(e) { photos = []; }
}
function savePhotos() {
  try { localStorage.setItem(PHOTO_KEY, JSON.stringify(photos)); }
  catch(e) { /* quota exceeded — drop oldest */ photos.shift(); savePhotos(); }
}

function takePhoto() {
  if(gameOver) return;
  // 合成背景 + 游戏 canvas
  const off = document.createElement('canvas');
  off.width = 400; off.height = 280;
  const c = off.getContext('2d');
  c.drawImage(bgCanvas, 0, 0, 400, 280);
  c.drawImage(canvas, 0, 0, 400, 280);

  // 加水印（猫咪名字 + 月份）
  c.fillStyle = 'rgba(0,0,0,0.4)';
  c.fillRect(0, 248, 400, 32);
  c.fillStyle = '#fff';
  c.font = 'bold 13px "Microsoft YaHei",serif';
  c.textAlign = 'left';
  c.fillText(`🏷️ ${catName || '小猫'} · 第 ${month} 月`, 12, 268);
  c.textAlign = 'right';
  c.fillText(`❤️ ${STATS.trust}%`, 388, 268);

  const dataUrl = off.toDataURL('image/jpeg', 0.7);
  photos.unshift({
    id: Date.now(),
    data: dataUrl,
    month, trust: STATS.trust,
    pose: CAT.pose || 'stand',
    catName: catName || '小猫',
    date: new Date().toLocaleString('zh-CN', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }),
  });

  // 限制最多 30 张照片（IE 兼容性 + localStorage 配额）
  if(photos.length > 30) photos = photos.slice(0, 30);
  savePhotos();

  // 闪光动效 + 提示
  const flash = document.getElementById('flash');
  flash.classList.remove('show'); void flash.offsetWidth;
  flash.classList.add('show');
  sfx('save');
  showToast('📸', `照片已保存 · 当前 ${photos.length} 张`);

  checkAchievements();
}

function openAlbum() {
  loadPhotos();
  const grid = document.getElementById('album-grid');
  const empty = document.getElementById('album-empty');
  grid.innerHTML = '';
  if(photos.length === 0) {
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    photos.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'album-card';
      card.innerHTML = `
        <img src="${p.data}" alt="">
        <div class="card-info">
          <span>第 ${p.month} 月</span>
          <span>❤️ ${p.trust}%</span>
        </div>
        <div class="card-actions">
          <button class="card-btn" title="下载" onclick="downloadPhoto(${i})">⬇</button>
          <button class="card-btn" title="删除" onclick="deletePhoto(${i})">✕</button>
        </div>
      `;
      grid.appendChild(card);
    });
  }
  document.getElementById('album-panel').classList.add('show');
}
function closeAlbum(e) {
  if(e && e.target.id !== 'album-panel' && e.type === 'click') return;
  document.getElementById('album-panel').classList.remove('show');
}
function deletePhoto(i) {
  photos.splice(i, 1);
  savePhotos();
  openAlbum();
}
function downloadPhoto(i) {
  const p = photos[i];
  const a = document.createElement('a');
  a.href = p.data;
  a.download = `${p.catName}_第${p.month}月.jpg`;
  a.click();
}

let unlockedAchievements = new Set();
let seenPoses = new Set();
let wishesFulfilled = 0;
let personalitiesMet = new Set();

function loadAchievements() {
  try {
    const data = JSON.parse(localStorage.getItem(ACH_KEY) || '{}');
    unlockedAchievements = new Set(data.ach || []);
    seenPoses = new Set(data.poses || []);
    wishesFulfilled = data.wishes || 0;
    personalitiesMet = new Set(data.pers || []);
  } catch(e) {
    unlockedAchievements = new Set();
    seenPoses = new Set();
    wishesFulfilled = 0;
    personalitiesMet = new Set();
  }
}
function saveAchievements() {
  localStorage.setItem(ACH_KEY, JSON.stringify({
    ach: [...unlockedAchievements],
    poses: [...seenPoses],
    wishes: wishesFulfilled,
    pers: [...personalitiesMet],
  }));
}

function checkAchievements() {
  ACHIEVEMENTS.forEach(a => {
    if(unlockedAchievements.has(a.id)) return;
    try {
      if(a.check()) {
        unlockedAchievements.add(a.id);
        saveAchievements();
        showAchievementToast(a);
      }
    } catch(e) {}
  });
}

function showAchievementToast(a) {
  const el = document.getElementById('ach-toast');
  document.getElementById('at-icon').textContent = a.icon;
  document.getElementById('at-name').textContent = a.name;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  sfx('unlock');
  setTimeout(() => el.classList.remove('show'), 4000);
}

function openAchievements() {
  loadAchievements();
  const list = document.getElementById('ach-list');
  list.innerHTML = '';
  const unlocked = ACHIEVEMENTS.filter(a => unlockedAchievements.has(a.id)).length;
  document.getElementById('ach-progress').textContent =
    `已解锁 ${unlocked} / ${ACHIEVEMENTS.length}`;

  ACHIEVEMENTS.forEach(a => {
    const isUnlocked = unlockedAchievements.has(a.id);
    const el = document.createElement('div');
    el.className = 'ach-item ' + (isUnlocked ? 'unlocked' : 'locked');
    el.innerHTML = `
      <div class="ach-icon">${isUnlocked ? a.icon : '🔒'}</div>
      <div class="ach-info">
        <div class="ach-name">${a.name}</div>
        <div class="ach-desc">${a.desc}</div>
      </div>
      <div class="ach-status">${isUnlocked ? '✓ 已解锁' : '未解锁'}</div>
    `;
    list.appendChild(el);
  });
  document.getElementById('ach-panel').classList.add('show');
}
function closeAchievements(e) {
  if(e && e.target.id !== 'ach-panel' && e.type === 'click') return;
  document.getElementById('ach-panel').classList.remove('show');
}

// ─── Audio Engine ─────────────────────────────────────────────────────────────
let audioCtx = null;
let bgmPlaying = false;
let bgmNodes = null;
let bgmTrack = 0;             // 0,1,2 三首
let bgmVolume = 0.5;          // 0~1，用户调节
let sfxVolume = 0.7;          // 0~1，用户调节

function getAudioCtx() {
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// 播放单个音符
function playNote(freq, type, startTime, duration, gain, ctx, dest) {
  const osc = ctx.createOscillator();
  const env = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, startTime);
  env.gain.setValueAtTime(0, startTime);
  env.gain.linearRampToValueAtTime(gain, startTime + 0.02);
  env.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.connect(env); env.connect(dest);
  osc.start(startTime); osc.stop(startTime + duration + 0.05);
}

// BGM：轻快的循环小曲
function startBGM() {
  stopBGM(); // 防止重复启动
  const ctx = getAudioCtx();
  if(ctx.state === 'suspended') ctx.resume();
  const master = ctx.createGain();
  master.gain.value = bgmVolume * 0.36;
  master.connect(ctx.destination);

  const track = BGM_TRACKS[bgmTrack];
  const { notes, melody, beat } = track;

  let startTime = ctx.currentTime + 0.1;
  const loopDuration = melody.length * beat;

  function scheduleBGM(offset) {
    melody.forEach((ni, i) => {
      const t = offset + i * beat;
      // 主旋律
      playNote(notes[ni], 'triangle', t, beat * 0.7, 0.5, ctx, master);
      // 低音伴奏（每4拍）
      if(i % 4 === 0) {
        playNote(notes[ni % 3] * 0.5, 'sine', t, beat * 1.8, 0.3, ctx, master);
      }
      // 装饰音（每8拍加一个高八度短音）
      if(i % 8 === 3) {
        playNote(notes[ni] * 2, 'triangle', t + beat * 0.5, beat * 0.3, 0.2, ctx, master);
      }
    });
  }

  scheduleBGM(startTime);
  const intervalId = setInterval(() => {
    if(!bgmPlaying) { clearInterval(intervalId); try{master.disconnect();}catch(e){} return; }
    startTime += loopDuration;
    scheduleBGM(startTime);
  }, loopDuration * 1000 - 200);

  bgmNodes = { master, intervalId };
}

function stopBGM() {
  if(bgmNodes) {
    clearInterval(bgmNodes.intervalId);
    try { bgmNodes.master.gain.linearRampToValueAtTime(0, getAudioCtx().currentTime + 0.3); }
    catch(e) {}
    setTimeout(() => { try { bgmNodes && bgmNodes.master.disconnect(); } catch(e){} }, 400);
    bgmNodes = null;
  }
}

function setBGMVolume(v) {
  bgmVolume = Math.max(0, Math.min(1, v));
  if(bgmNodes) {
    try {
      bgmNodes.master.gain.linearRampToValueAtTime(bgmVolume * 0.36, getAudioCtx().currentTime + 0.1);
    } catch(e) {}
  }
}

function setSFXVolume(v) {
  sfxVolume = Math.max(0, Math.min(1, v));
}

function switchBGMTrack(idx) {
  bgmTrack = idx;
  document.getElementById('bgm-name').textContent = BGM_TRACKS[idx].name;
  if(bgmPlaying) {
    stopBGM();
    setTimeout(() => { if(bgmPlaying) startBGM(); }, 350);
  }
}

function nextBGMTrack() {
  switchBGMTrack((bgmTrack + 1) % BGM_TRACKS.length);
}

function toggleBGM() {
  const btn = document.getElementById('bgm-toggle-btn');
  if(bgmPlaying) {
    bgmPlaying = false;
    stopBGM();
    if(btn) btn.textContent = '播放';
  } else {
    bgmPlaying = true;
    startBGM();
    if(btn) btn.textContent = '暂停';
  }
}

function toggleAudioPanel() {
  const panel = document.getElementById('audio-panel');
  panel.classList.toggle('show');
}

// 关闭面板：点击外部
document.addEventListener('click', (e) => {
  const panel = document.getElementById('audio-panel');
  const btn   = document.getElementById('btn-bgm');
  if(panel.classList.contains('show')
      && !panel.contains(e.target) && e.target !== btn) {

});

// ─── SFX ─────────────────────────────────────────────────────────────────────
function sfx(type) {
  const ctx = getAudioCtx();
  if(ctx.state === 'suspended') ctx.resume();
  const master = ctx.createGain();
  // 猫叫音量大一些，其他音效正常
  const baseGain = type === 'meow' ? 1.0 : 0.4;
  master.gain.value = baseGain * sfxVolume;
  master.connect(ctx.destination);
  const now = ctx.currentTime;

  if(type === 'feed') {
    // 脆脆咬东西声：短促噪声burst
    [0, 0.08, 0.16].forEach(dt => {
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.06, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for(let i = 0; i < data.length; i++) data[i] = (Math.random()*2-1) * (1 - i/data.length);
      const src = ctx.createBufferSource();
      const flt = ctx.createBiquadFilter();
      flt.type = 'bandpass'; flt.frequency.value = 1800 + dt*500; flt.Q.value = 2;
      src.buffer = buf;
      src.connect(flt); flt.connect(master);
      src.start(now + dt);
    });

  } else if(type === 'play') {
    // 活泼弹奏：跳跃的音阶
    [523.3, 659.3, 783.9, 1046.5].forEach((f, i) => {
      playNote(f, 'square', now + i*0.1, 0.15, 0.35, ctx, master);
    });

  } else if(type === 'pet') {
    // 咕噜声：低频颤动
    const osc = ctx.createOscillator();
    const lfo = ctx.createOscillator();
    const lfoGain = ctx.createGain();
    const env = ctx.createGain();
    osc.type = 'sawtooth'; osc.frequency.value = 55;
    lfo.type = 'sine'; lfo.frequency.value = 28;
    lfoGain.gain.value = 18;
    lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(0.35, now + 0.15);
    env.gain.setValueAtTime(0.35, now + 0.8);
    env.gain.linearRampToValueAtTime(0, now + 1.1);
    osc.connect(env); env.connect(master);
    lfo.start(now); osc.start(now);
    lfo.stop(now + 1.1); osc.stop(now + 1.1);

  } else if(type === 'sleep') {
    // 轻柔叮声
    playNote(880, 'sine', now, 0.8, 0.5, ctx, master);
    playNote(1108, 'sine', now+0.15, 0.6, 0.25, ctx, master);

  } else if(type === 'meow') {
    // 真实猫叫音频（来自 base64 mp3）
    playMeowSound();
    try { master.disconnect(); } catch(e){}
    return;

  } else if(type === 'unlock') {
    // 解锁提示音：上升和弦
    [523.3, 659.3, 783.9].forEach((f, i) => {
      playNote(f, 'sine', now + i*0.07, 0.4, 0.4, ctx, master);
    });

  } else if(type === 'save') {
    // 保存：清脆两声
    playNote(880, 'sine', now, 0.15, 0.4, ctx, master);
    playNote(1108,'sine', now+0.12, 0.2, 0.3, ctx, master);
  }

  later(1500, () => { try { master.disconnect(); } catch(e){} });
}
</script>
